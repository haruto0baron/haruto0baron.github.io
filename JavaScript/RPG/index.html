<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Mini 3D RPG Engine</title>
<style>
  body { margin: 0; overflow: hidden; font-family: sans-serif; }
  #ui {
    position: absolute;
    bottom: 20px;
    left: 20px;
    width: 300px;
    padding: 10px;
    background: rgba(0,0,0,0.7);
    color: white;
    display: none;
  }
  #choices button {
    display: block;
    margin-top: 5px;
    width: 100%;
  }
</style>
</head>
<body>

<div id="ui">
  <div id="text"></div>
  <div id="choices"></div>
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js";

/* =========================
   基本エンジン
========================= */
class Engine {
  constructor() {
    this.scene = new THREE.Scene();
    this.scene.background = new THREE.Color(0x87ceeb);

    this.camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
    this.camera.position.set(5,5,5);

    this.renderer = new THREE.WebGLRenderer();
    this.renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(this.renderer.domElement);

    this.entities = [];
    this.flags = {};

    this.clock = new THREE.Clock();

    window.addEventListener("resize", ()=>{
      this.camera.aspect = innerWidth/innerHeight;
      this.camera.updateProjectionMatrix();
      this.renderer.setSize(innerWidth, innerHeight);
    });

    this.loop();
  }

  add(entity){
    this.entities.push(entity);
    this.scene.add(entity.mesh);
  }

  loop(){
    requestAnimationFrame(()=>this.loop());

    let dt = this.clock.getDelta();

    for(let e of this.entities){
      if(e.update) e.update(dt);
    }

    this.renderer.render(this.scene, this.camera);
  }
}

/* =========================
   入力管理
========================= */
const keys = {};
window.addEventListener("keydown", e=>keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e=>keys[e.key.toLowerCase()] = false);

/* =========================
   プレイヤー
========================= */
class Player {
  constructor(engine){
    this.engine = engine;

    this.mesh = new THREE.Mesh(
      new THREE.BoxGeometry(1,1,1),
      new THREE.MeshBasicMaterial({color:0x00ff00})
    );

    this.velocity = new THREE.Vector3();
    this.onGround = false;
  }

  update(dt){
    // 移動
    let speed = 5;
    if(keys["w"]) this.mesh.position.z -= speed*dt;
    if(keys["s"]) this.mesh.position.z += speed*dt;
    if(keys["a"]) this.mesh.position.x -= speed*dt;
    if(keys["d"]) this.mesh.position.x += speed*dt;

    // ジャンプ
    if(keys[" "] && this.onGround){
      this.velocity.y = 8;
      this.onGround = false;
    }

    // 重力
    this.velocity.y -= 20 * dt;
    this.mesh.position.y += this.velocity.y * dt;

    // 地面衝突
    if(this.mesh.position.y < 0.5){
      this.mesh.position.y = 0.5;
      this.velocity.y = 0;
      this.onGround = true;
    }

    // カメラ追従
    this.engine.camera.position.lerp(
      new THREE.Vector3(
        this.mesh.position.x + 5,
        this.mesh.position.y + 5,
        this.mesh.position.z + 5
      ),
      0.1
    );
    this.engine.camera.lookAt(this.mesh.position);
  }
}

/* =========================
   NPC
========================= */
class NPC {
  constructor(engine, x, z){
    this.engine = engine;

    this.mesh = new THREE.Mesh(
      new THREE.BoxGeometry(1,1,1),
      new THREE.MeshBasicMaterial({color:0xff0000})
    );
    this.mesh.position.set(x,0.5,z);

    this.dialogueIndex = 0;

    this.dialogues = [
      {
        text:["こんにちは！冒険者さん！","ジャンプ台に乗ってみて！"],
      },
      {
        text:["また来たね！"],
      }
    ];
  }

  update(){
    let player = this.engine.player;
    let dist = player.mesh.position.distanceTo(this.mesh.position);

    if(dist < 2 && keys["e"]){
      this.startDialogue();
    }
  }

  startDialogue(){
    let flag = this.engine.flags["talked"];
    let d = flag ? this.dialogues[1] : this.dialogues[0];
    this.engine.flags["talked"] = true;

    DialogueSystem.start(d.text);
  }
}

/* =========================
   ギミック
========================= */

// ジャンプ台
class JumpPad {
  constructor(x,z){
    this.mesh = new THREE.Mesh(
      new THREE.BoxGeometry(1,0.2,1),
      new THREE.MeshBasicMaterial({color:0xffff00})
    );
    this.mesh.position.set(x,0.1,z);
  }

  update(){
    let p = engine.player;
    let dist = p.mesh.position.distanceTo(this.mesh.position);

    if(dist < 1){
      p.velocity.y = 12;
    }
  }
}

/* =========================
   会話システム
========================= */
const ui = document.getElementById("ui");
const textEl = document.getElementById("text");
const choicesEl = document.getElementById("choices");

class DialogueSystem {
  static start(lines){
    this.lines = lines;
    this.index = 0;
    ui.style.display = "block";
    this.show();
  }

  static show(){
    textEl.innerText = this.lines[this.index];
    choicesEl.innerHTML = "";
  }

  static next(){
    this.index++;
    if(this.index >= this.lines.length){
      ui.style.display = "none";
    } else {
      this.show();
    }
  }
}

window.addEventListener("click", ()=>DialogueSystem.next());
window.addEventListener("keydown", e=>{
  if(e.key === "Enter") DialogueSystem.next();
});

/* =========================
   初期化
========================= */
const engine = new Engine();

// 地面
const ground = new THREE.Mesh(
  new THREE.BoxGeometry(20,1,20),
  new THREE.MeshBasicMaterial({color:0x228B22})
);
ground.position.y = -0.5;
engine.scene.add(ground);

// プレイヤー
const player = new Player(engine);
engine.player = player;
engine.add(player);

// NPC
const npc = new NPC(engine, 3, 0);
engine.add(npc);

// ジャンプ台
const jumpPad = new JumpPad(0,3);
engine.add(jumpPad);

</script>
