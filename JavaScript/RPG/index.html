<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Memory Square RPG</title>
<style>
html,body{margin:0;padding:0;overflow:hidden;background:#000;font-family:monospace;}
canvas{display:block;}

#ui{position:absolute;inset:0;pointer-events:none;}

.panel{
background:rgba(20,20,35,0.55);
backdrop-filter: blur(10px);
border:1px solid rgba(255,255,255,0.12);
border-radius:14px;
color:#fff;
padding:10px;
}

#topBar{position:absolute;top:10px;left:50%;transform:translateX(-50%);}

#cmd{position:absolute;bottom:20px;left:20px;width:220px;}
#status{position:absolute;bottom:20px;right:20px;width:220px;}

#dialog{
position:absolute;bottom:170px;left:50%;transform:translateX(-50%);
width:60%;
display:none;
}

#battleUI{
position:absolute;bottom:180px;left:50%;transform:translateX(-50%);
width:60%;
display:none;
}

.choice{padding:4px 0;}
.small{font-size:12px;opacity:0.8;}

#miniMap{
position:absolute;top:10px;right:10px;
width:140px;height:140px;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">

<div id="topBar" class="panel">チュートリアル</div>

<canvas id="miniMap" class="panel" width="140" height="140"></canvas>

<div id="cmd" class="panel">
<div>▶ 移動</div>
<div>▶ 触れると戦闘</div>
<div class="small">Enter / 矢印</div>
</div>

<div id="status" class="panel">
HP: <span id="hp">10</span><br>
敵HP: <span id="ehp">-</span><br>
状態: 探索
</div>

<div id="dialog" class="panel"></div>

<div id="battleUI" class="panel">
<div id="bText">戦闘開始</div>
<div class="choice">▶ たたかう</div>
<div class="choice">▶ まほう</div>
<div class="choice">▶ ぼうぎょ</div>
<div class="choice">▶ にげる</div>
<div class="small">Enterで決定</div>
</div>

</div>

<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");
const mini=document.getElementById("miniMap");
const mctx=mini.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
addEventListener("resize",resize);
resize();

// ================= STAGES =================
const stages=[
{
name:"さびれたスタートタウン",
bg:"#0f1020",
enemyColor:"#f55",
npcColor:"#6a6",
enemyName:"感情バグ（弱）"
},
{
name:"ノイズの森",
bg:"#0b1a12",
enemyColor:"#f77",
npcColor:"#7f7",
enemyName:"ノイズバグ"
},
{
name:"反転砂漠",
bg:"#1a1410",
enemyColor:"#fa4",
npcColor:"#aa7",
enemyName:"砂漠バグ"
},
{
name:"無音の海",
bg:"#081018",
enemyColor:"#5af",
npcColor:"#7aa",
enemyName:"沈黙バグ"
},
{
name:"メモリの塔",
bg:"#141020",
enemyColor:"#c6f",
npcColor:"#aaf",
enemyName:"記憶バグ"
},
{
name:"最終領域",
bg:"#000",
enemyColor:"#ff0",
npcColor:"#888",
enemyName:"コアバグ"
}
];

let stage=0;

// ================= MAP =================
const map=[
"################",
"#..N.....E.....#",
"#..............#",
"#......D.......#",
"#..............#",
"################"
];

// ================= PLAYER =================
let player={x:2,y:2};

// ================= ENEMY OBJECTS =================
let enemies=[];

// spawn enemies
function spawnEnemies(){
enemies=[];
for(let i=0;i<3;i++){
enemies.push({x:8+i,y:1,type:"enemy",hp:3});
}
}
spawnEnemies();

// ================= STATE =================
let mode="field";
let battle=null;
let dialogQueue=[];

// ================= INPUT =================
const keys={};
let lock=0;

addEventListener("keydown",e=>{
if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)){
keys[e.key]=true;
e.preventDefault();
}
if(e.key==="Enter")handleEnter();
});
addEventListener("keyup",e=>keys[e.key]=false);

// ================= UI =================
const dialog=document.getElementById("dialog");
const battleUI=document.getElementById("battleUI");

function showDialog(t){
dialog.style.display="block";
dialog.innerText=t;
}

function hideDialog(){
dialog.style.display="none";
}

function showBattleUI(show){
battleUI.style.display=show?"block":"none";
}

// ================= ENTER =================
function handleEnter(){
if(mode==="dialog"){
nextDialog();
return;
}
if(mode==="battle"){
battleTurn();
return;
}
}

// ================= DIALOG =================
function enqueue(t){
dialogQueue.push(t);
if(mode==="field"){
showDialog(dialogQueue.shift());
}
}

function nextDialog(){
if(dialogQueue.length){
showDialog(dialogQueue.shift());
}else{
hideDialog();
mode="field";
}
}

// ================= COLLISION =================
function solid(x,y){
return map[y][x]==="#";
}

// ================= STAGE CHANGE =================
function nextStage(){
stage++;
if(stage>=stages.length){
showDialog("ゲームクリア：世界は修復された");
return;
}

player.x=2;player.y=2;
spawnEnemies();

document.getElementById("topBar").innerText=stages[stage].name;
enqueue("世界の色が変わった");
}

// ================= BATTLE (POKEMON STYLE) =================
function startBattle(enemy){
mode="battle";
battle={
name:enemy.name,
hp:enemy.hp,
max:enemy.hp,
stage:stage
};

document.getElementById("ehp").innerText=battle.hp;
showBattleUI(true);
showDialog(enemy.name+" が現れた！");
}

function battleTurn(){

const action="attack";

if(action==="attack"){
battle.hp-=2;
enqueue("こうげき！");
}

if(battle.hp<=0){
enqueue(battle.name+" を倒した！");
showBattleUI(false);
mode="field";
document.getElementById("ehp").innerText="-";

if(stage===stages.length-1){
enqueue("コアが崩壊した");
}else{
enqueue("記憶の断片を取得");
}
}
}

// ================= UPDATE =================
function update(){

if(lock>0)lock--;

if(mode!=="field")return;

let dx=0,dy=0;

if(keys["ArrowUp"])dy=-1;
if(keys["ArrowDown"])dy=1;
if(keys["ArrowLeft"])dx=-1;
if(keys["ArrowRight"])dx=1;

if((dx||dy)&&lock===0){

const nx=player.x+dx;
const ny=player.y+dy;

if(!solid(nx,ny)){
player.x=nx;
player.y=ny;
lock=6;
}

// enemy encounter (touch triggers battle)
for(let e of enemies){
if(e.x===player.x && e.y===player.y){
startBattle({name:stages[stage].enemyName,hp:5});
}
}

// stage gate
if(map[player.y][player.x]==="D"){
nextStage();
}

if(map[player.y][player.x]==="N"){
enqueue("NPC：この世界は壊れている");
}
}
}

// ================= DRAW =================
function draw(){

// stage background
ctx.fillStyle=stages[stage].bg;
ctx.fillRect(0,0,canvas.width,canvas.height);

const cx=canvas.width/2;
const cy=canvas.height/2+40;

// iso
function iso(x,y){
const tile=52;
const px=(x-y)*tile*0.9;
const py=(x+y)*tile*0.45;
return [cx+px,cy+py];
}

// tiles
for(let y=0;y<map.length;y++){
for(let x=0;x<map[y].length;x++){

const t=map[y][x];
const [px,py]=iso(x,y);

let col="#111";
if(t==="#")col="#333";
if(t==="D")col="#4af";
if(t==="N")col=stages[stage].npcColor;
if(t==="E")col=stages[stage].enemyColor;

ctx.shadowColor=col;
ctx.shadowBlur=10;

ctx.fillStyle=col;
ctx.beginPath();
ctx.moveTo(px,py);
ctx.lineTo(px+24,py+12);
ctx.lineTo(px,py+24);
ctx.lineTo(px-24,py+12);
ctx.closePath();
ctx.fill();
}
}

// enemies (visible better)
for(let e of enemies){
const [px,py]=iso(e.x,e.y);
ctx.fillStyle=stages[stage].enemyColor;
ctx.fillRect(px-10,py-10,20,20);
}

// player (square)
const [px,py]=iso(player.x,player.y);
ctx.fillStyle="#fff";
ctx.fillRect(px-10,py-10,20,20);

// face
ctx.fillStyle="#000";
ctx.fillRect(px-5,py-5,3,3);
ctx.fillRect(px+2,py-5,3,3);
}

// ================= MINIMAP =================
function miniMap(){
mctx.clearRect(0,0,140,140);

for(let y=0;y<map.length;y++){
for(let x=0;x<map[y].length;x++){
let c="#222";
if(map[y][x]==="#")c="#444";
if(map[y][x]==="D")c="#4af";
if(map[y][x]==="N")c=stages[stage].npcColor;
if(map[y][x]==="E")c=stages[stage].enemyColor;

mctx.fillStyle=c;
mctx.fillRect(x*10,y*10,10,10);
}
}

mctx.fillStyle="#fff";
mctx.fillRect(player.x*10,player.y*10,10,10);
}

// ================= LOOP =================
function loop(){
update();
draw();
miniMap();
requestAnimationFrame(loop);
}
loop();

// ================= INIT =================
document.getElementById("topBar").innerText=stages[0].name;
enqueue("触れると戦闘が始まる");
enqueue("ポケモン風ターン制：Enterで攻撃");
</script>

</body>
</html>
