<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Memory Square HD-2D RPG</title>
<style>
html,body{
margin:0;padding:0;overflow:hidden;background:#000;
font-family:monospace;
}

canvas{display:block;}

#ui{position:absolute;inset:0;pointer-events:none;}

.panel{
background:rgba(20,20,35,0.55);
backdrop-filter: blur(10px);
border:1px solid rgba(255,255,255,0.12);
border-radius:14px;
color:#fff;
padding:10px;
}

#topBar{
position:absolute;top:10px;left:50%;transform:translateX(-50%);
}

#cmd{
position:absolute;bottom:20px;left:20px;width:200px;
}

#status{
position:absolute;bottom:20px;right:20px;width:180px;
}

#dialog{
position:absolute;bottom:170px;left:50%;transform:translateX(-50%);
width:60%;
display:none;
}

#miniMap{
position:absolute;top:10px;right:10px;
width:160px;height:160px;
padding:6px;
}

.small{font-size:12px;opacity:0.8}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">

<div id="topBar" class="panel">さびれたスタートタウン</div>

<div id="miniMap" class="panel">
<canvas id="m" width="140" height="140"></canvas>
</div>

<div id="cmd" class="panel">
<div>▶ たたかう</div>
<div>▶ まほう</div>
<div>▶ ぼうぎょ</div>
<div>▶ にげる</div>
<div class="small">Enter / 矢印</div>
</div>

<div id="status" class="panel">
HP: 10<br>
MP: 5
</div>

<div id="dialog" class="panel"></div>

</div>

<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

const mini=document.getElementById("m");
const mctx=mini.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
addEventListener("resize",resize);
resize();

// ===== MAP =====
const maps={
town:[
"################",
"#......N.......#",
"#..............#",
"#......D.......#",
"#..............#",
"################"
],
forest:[
"################",
"#....E.........#",
"#..............#",
"#......D.......#",
"#..............#",
"################"
],
void:[
"################",
"#....E....E....#",
"#..............#",
"#......D.......#",
"#..............#",
"################"
]
};

let scene="town";
let map=maps[scene];

// ===== PLAYER =====
let player={x:2,y:2};

// ===== INPUT =====
const keys={};
let lock=0;

addEventListener("keydown",e=>{
if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)){
keys[e.key]=true;
e.preventDefault();
}
if(e.key==="Enter")handleEnter();
});

addEventListener("keyup",e=>keys[e.key]=false);

// ===== ENTER =====
function handleEnter(){
}

// ===== COLLISION =====
function solid(x,y){
return map[y][x]==="#";
}

// ===== SCENE =====
function changeScene(to){
scene=to;
map=maps[scene];
player.x=2;player.y=2;
}

// ===== UPDATE =====
function update(){
if(lock>0)lock--;

let dx=0,dy=0;

if(keys["ArrowUp"])dy=-1;
if(keys["ArrowDown"])dy=1;
if(keys["ArrowLeft"])dx=-1;
if(keys["ArrowRight"])dx=1;

if((dx||dy) && lock===0){
const nx=player.x+dx;
const ny=player.y+dy;

if(!solid(nx,ny)){
player.x=nx;
player.y=ny;
lock=5;
}

const t=map[player.y][player.x];
if(t==="D")changeScene(scene==="town"?"forest":"void");
}
}

// ===== ISO CAMERA =====
function iso(x,y,cx,cy){
const tile=50;
const px=(x-y)*tile*0.9;
const py=(x+y)*tile*0.45;
return [cx+px,cy+py];
}

// ===== DRAW =====
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

const cx=canvas.width/2;
const cy=canvas.height/2+50;

// bg
const g=ctx.createRadialGradient(cx,cy,50,cx,cy,700);
g.addColorStop(0,"#0b0d25");
g.addColorStop(1,"#000");
ctx.fillStyle=g;
ctx.fillRect(0,0,canvas.width,canvas.height);

// depth sort
const objs=[];
for(let y=0;y<map.length;y++){
for(let x=0;x<map[y].length;x++){
objs.push({x,y,t:map[y][x]});
}
}
objs.sort((a,b)=>(a.x+a.y)-(b.x+b.y));

// tiles
for(const o of objs){
const [px,py]=iso(o.x,o.y,cx,cy);

let col="#111";
if(o.t==="#")col="#2a2a3a";
if(o.t==="D")col="#4af";
if(o.t==="N")col="#6a6";
if(o.t==="E")col="#f55";

ctx.shadowColor=col;
ctx.shadowBlur=12;

ctx.fillStyle=col;

// diamond tile
ctx.beginPath();
ctx.moveTo(px,py);
ctx.lineTo(px+25,py+12);
ctx.lineTo(px,py+25);
ctx.lineTo(px-25,py+12);
ctx.closePath();
ctx.fill();

ctx.shadowBlur=0;
}

// PLAYER（四角）
const [px,py]=iso(player.x,player.y,cx,cy);

ctx.shadowColor="#fff";
ctx.shadowBlur=18;

ctx.fillStyle="#fff";
ctx.fillRect(px-10,py-10,20,20);

// face
ctx.fillStyle="#000";
ctx.fillRect(px-5,py-5,3,3);
ctx.fillRect(px+2,py-5,3,3);
}

// ===== MINIMAP =====
function drawMiniMap(){
mctx.clearRect(0,0,140,140);

const w=map[0].length;
const h=map.length;

const sx=140/w;
const sy=140/h;

for(let y=0;y<h;y++){
for(let x=0;x<w;x++){

let c="#222";
if(map[y][x]==="#")c="#444";
if(map[y][x]==="D")c="#4af";
if(map[y][x]==="N")c="#6a6";
if(map[y][x]==="E")c="#f55";

mctx.fillStyle=c;
mctx.fillRect(x*sx,y*sy,sx,sy);
}
}

// player
mctx.fillStyle="#fff";
mctx.fillRect(player.x*sx,player.y*sy,sx,sy);
}

// ===== LOOP =====
function loop(){
update();
draw();
drawMiniMap();
requestAnimationFrame(loop);
}
loop();

</script>
</body>
</html>
