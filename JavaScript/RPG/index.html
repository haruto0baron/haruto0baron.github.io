<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ミニRPG - ECHOES</title>
<style>
body {
    margin:0;
    font-family: monospace;
    background:#111;
    color:#eee;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
#game {
    width:360px;
    height:640px;
    background:#000;
    border:2px solid #555;
    position:relative;
    overflow:hidden;
}
.screen {
    position:absolute;
    width:100%;
    height:100%;
    display:none;
    padding:10px;
    box-sizing:border-box;
}
.active { display:block; }

button {
    width:100%;
    margin:5px 0;
    padding:10px;
    background:#222;
    color:#fff;
    border:1px solid #555;
}
#log {
    height:150px;
    overflow-y:auto;
    border:1px solid #555;
    padding:5px;
    margin-bottom:5px;
    font-size:12px;
}
.bar {
    height:10px;
    background:#333;
    margin-bottom:4px;
}
.fill {
    height:100%;
    background:#0f0;
}
.enemy .fill { background:#f00; }

.small { font-size:12px; }
</style>
</head>
<body>
<div id="game">

<!-- TITLE -->
<div id="title" class="screen active">
<h2>ECHOES</h2>
<p>崩壊した世界で記憶を集めるRPG</p>
<button onclick="newGame()">開始</button>
<button onclick="loadGame()">ロード</button>
</div>

<!-- GAME -->
<div id="gameplay" class="screen">
<div id="status"></div>
<div id="log"></div>
<div id="actions"></div>
</div>

</div>

<script>
// ===== UTIL =====
function rand(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

// ===== DATA =====
const enemies = [
    {name:"影の獣", hp:20, atk:5, exp:10},
    {name:"壊れた兵士", hp:30, atk:7, exp:15},
    {name:"虚無の精霊", hp:40, atk:9, exp:20}
];

const items = [
    {name:"回復薬", heal:20}
];

// ===== PLAYER =====
let player;
let currentEnemy;
let state = "title";

// ===== INIT =====
function newGame(){
    player = {
        hp:100,
        maxHp:100,
        atk:10,
        level:1,
        exp:0,
        inventory:[{...items[0]}],
        skills:["斬撃","回復"]
    };
    logClear();
    switchScreen("gameplay");
    storyIntro();
}

function loadGame(){
    const save = localStorage.getItem("rpg_save");
    if(save){
        player = JSON.parse(save);
        switchScreen("gameplay");
        log("ロード成功");
        explore();
    } else {
        alert("セーブデータなし");
    }
}

function saveGame(){
    localStorage.setItem("rpg_save", JSON.stringify(player));
    log("セーブ完了");
}

// ===== UI =====
function switchScreen(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function log(text){
    const logEl = document.getElementById("log");
    logEl.innerHTML += text + "<br>";
    logEl.scrollTop = logEl.scrollHeight;
}

function logClear(){
    document.getElementById("log").innerHTML="";
}

function renderStatus(){
    document.getElementById("status").innerHTML = `
    <div>Lv:${player.level} HP:${player.hp}/${player.maxHp} EXP:${player.exp}</div>
    <div class="bar"><div class="fill" style="width:${player.hp/player.maxHp*100}%"></div></div>
    `;
}

function setActions(html){
    document.getElementById("actions").innerHTML = html;
}

// ===== STORY =====
function storyIntro(){
    log("…世界は崩壊した");
    log("あなたは記憶を失っている");
    log("残されたのは戦う力だけ…");
    explore();
}

// ===== GAME LOOP =====
function explore(){
    renderStatus();
    setActions(`
        <button onclick="battleStart()">探索</button>
        <button onclick="openMenu()">メニュー</button>
    `);
}

// ===== BATTLE =====
function battleStart(){
    currentEnemy = JSON.parse(JSON.stringify(enemies[rand(0,enemies.length-1)]));
    log("敵出現: "+currentEnemy.name);
    battleTurn();
}

function battleTurn(){
    renderStatus();
    setActions(`
        <div class="enemy">敵: ${currentEnemy.name} HP:${currentEnemy.hp}</div>
        <div class="bar enemy"><div class="fill" style="width:${currentEnemy.hp/40*100}%"></div></div>
        <button onclick="attack()">攻撃</button>
        <button onclick="skill()">スキル</button>
        <button onclick="useItem()">アイテム</button>
        <button onclick="run()">逃げる</button>
    `);
}

function attack(){
    let dmg = rand(player.atk-2, player.atk+2);
    currentEnemy.hp -= dmg;
    log("攻撃 "+dmg);

    if(currentEnemy.hp <=0){
        winBattle();
        return;
    }

    enemyAttack();
}

function skill(){
    let dmg = player.atk * 2;
    currentEnemy.hp -= dmg;
    log("スキル発動 "+dmg);

    if(currentEnemy.hp <=0){
        winBattle();
        return;
    }

    enemyAttack();
}

function useItem(){
    if(player.inventory.length===0){
        log("アイテムなし");
        return;
    }
    let item = player.inventory.pop();
    player.hp = Math.min(player.maxHp, player.hp + item.heal);
    log("回復 "+item.heal);
    enemyAttack();
}

function run(){
    if(Math.random()<0.5){
        log("逃げ成功");
        explore();
    } else {
        log("逃げ失敗");
        enemyAttack();
    }
}

function enemyAttack(){
    let dmg = rand(currentEnemy.atk-2, currentEnemy.atk+2);
    player.hp -= dmg;
    log("敵攻撃 "+dmg);

    if(player.hp <=0){
        gameOver();
        return;
    }

    battleTurn();
}

function winBattle(){
    log("勝利！");
    player.exp += currentEnemy.exp;

    if(player.exp >= player.level * 20){
        player.exp = 0;
        player.level++;
        player.maxHp += 20;
        player.hp = player.maxHp;
        player.atk += 3;
        log("レベルアップ！");
    }

    explore();
}

function gameOver(){
    log("ゲームオーバー");
    setActions(`<button onclick="location.reload()">タイトルへ</button>`);
}

// ===== MENU =====
function openMenu(){
    setActions(`
        <button onclick="saveGame()">セーブ</button>
        <button onclick="explore()">戻る</button>
    `);
}

// ===== INIT =====
renderStatus();

</script>
</body>
</html>
