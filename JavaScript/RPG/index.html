<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Memory Square HD-2D RPG</title>
<style>
html,body{
margin:0;padding:0;overflow:hidden;background:#000;
font-family:monospace;
}

canvas{display:block;}

#ui{position:absolute;inset:0;pointer-events:none;}

.panel{
background:rgba(20,20,35,0.55);
backdrop-filter: blur(10px);
border:1px solid rgba(255,255,255,0.12);
border-radius:14px;
color:#fff;
padding:10px;
}

#topBar{
position:absolute;top:10px;left:50%;transform:translateX(-50%);
}

#cmd{
position:absolute;bottom:20px;left:20px;width:220px;
}

#status{
position:absolute;bottom:20px;right:20px;width:200px;
}

#dialog{
position:absolute;bottom:170px;left:50%;transform:translateX(-50%);
width:60%;
display:none;
}

#miniMap{
position:absolute;top:10px;right:10px;
width:150px;height:150px;
}

.small{font-size:12px;opacity:0.8}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">

<div id="topBar" class="panel">チュートリアル</div>

<canvas id="miniMap" class="panel" width="150" height="150"></canvas>

<div id="cmd" class="panel">
<div>▶ たたかう</div>
<div>▶ まほう</div>
<div>▶ ぼうぎょ</div>
<div>▶ にげる</div>
<div class="small">Enter / 矢印</div>
</div>

<div id="status" class="panel">
HP: <span id="hp">10</span><br>
MP: <span id="mp">5</span><br>
敵: -
</div>

<div id="dialog" class="panel"></div>

</div>

<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");
const mini=document.getElementById("miniMap");
const mctx=mini.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
addEventListener("resize",resize);
resize();

// ================= MAP STAGES =================
const stages=[
{
name:"チュートリアルの崩壊地",
map:[
"################",
"#......N.......#",
"#..............#",
"#......D.......#",
"#..............#",
"################"
]
},
{
name:"ノイズの森",
map:[
"################",
"#....E.........#",
"#......N.......#",
"#......D.......#",
"#..............#",
"################"
]
},
{
name:"反転砂漠",
map:[
"################",
"#....E....E....#",
"#..............#",
"#......D.......#",
"#......N.......#",
"################"
]
},
{
name:"無音の海",
map:[
"################",
"#....E.........#",
"#....E.........#",
"#......D.......#",
"#......N.......#",
"################"
]
},
{
name:"メモリの塔",
map:[
"################",
"#....E....E....#",
"#....E....E....#",
"#......D.......#",
"#......N.......#",
"################"
]
},
{
name:"最終領域",
map:[
"################",
"#..............#",
"#....E....E....#",
"#....B.........#",
"#......D.......#",
"################"
]
}
];

let stageIndex=0;
let map=stages[stageIndex].map;

// ================= PLAYER =================
let player={x:2,y:2,rx:2,ry:2};

// ================= CAMERA =================
let camX=0,camY=0;

// ================= INPUT =================
const keys={};
let lock=0;

addEventListener("keydown",e=>{
if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)){
keys[e.key]=true;
e.preventDefault();
}
if(e.key==="Enter")handleEnter();
});
addEventListener("keyup",e=>keys[e.key]=false);

// ================= GAME STATE =================
let mode="field";
let dialogQueue=[];

// ================= BATTLE =================
let battle=null;

/*
battle:
{enemyHP,maxHP,name}
*/

// ================= ENTER =================
function handleEnter(){
if(mode==="dialog"){
nextDialog();
return;
}

if(mode==="battle"){
battleTurn();
return;
}
}

// ================= DIALOG =================
const dialogBox=document.getElementById("dialog");

function showDialog(t){
mode="dialog";
dialogBox.style.display="block";
dialogBox.innerText=t;
}

function hideDialog(){
dialogBox.style.display="none";
}

function enqueue(t){
dialogQueue.push(t);
if(mode==="field")showDialog(dialogQueue.shift());
}

function nextDialog(){
if(dialogQueue.length>0){
showDialog(dialogQueue.shift());
}else{
hideDialog();
mode="field";
}
}

// ================= COLLISION =================
function solid(x,y){
return map[y][x]==="#";
}

// ================= STAGE =================
function nextStage(){
stageIndex++;
if(stageIndex>=stages.length){
showDialog("ゲームクリア：世界は修復された");
return;
}
map=stages[stageIndex].map;
player.x=2;player.y=2;
document.getElementById("topBar").innerText=stages[stageIndex].name;
enqueue("ステージ進行");
}

// ================= BATTLE =================
function startBattle(type="enemy"){
mode="battle";
battle={
name:type==="boss"?"感情バグ・コア":"感情バグ",
hp:type==="boss"?12:5,
max:type==="boss"?12:5
};
showDialog(battle.name+" 出現！");
}

function battleTurn(){

// player action simplified (attack only)
battle.hp-=2;

enqueue("攻撃！");
if(battle.hp<=0){
enqueue("撃破！");
mode="field";

if(battle.name.includes("コア")){
enqueue("世界のバグが消滅した");
}else{
enqueue("断片を回収");
}
}
}

// ================= UPDATE =================
function update(){

if(lock>0)lock--;

if(mode!=="field")return;

let dx=0,dy=0;

if(keys["ArrowUp"])dy=-1;
if(keys["ArrowDown"])dy=1;
if(keys["ArrowLeft"])dx=-1;
if(keys["ArrowRight"])dx=1;

// smooth movement lock
if((dx||dy) && lock===0){

const nx=player.x+dx;
const ny=player.y+dy;

if(!solid(nx,ny)){
player.x=nx;
player.y=ny;
lock=6;
}

const t=map[player.y][player.x];

if(t==="D")nextStage();
if(t==="E")startBattle();
if(t==="B")startBattle("boss");
if(t==="N")enqueue("記憶NPC：この世界は壊れている");
}
}

// ================= CAMERA FOLLOW =================
function updateCamera(){
camX += (player.x - camX)*0.12;
camY += (player.y - camY)*0.12;
}

// ================= DRAW ISO =================
function iso(x,y,cx,cy){
const tile=52;
const px=(x-y)*tile*0.9;
const py=(x+y)*tile*0.45;
return [cx+px,cy+py];
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

const cx=canvas.width/2;
const cy=canvas.height/2+40;

// bg glow
const g=ctx.createRadialGradient(cx,cy,50,cx,cy,800);
g.addColorStop(0,"#101030");
g.addColorStop(1,"#000");
ctx.fillStyle=g;
ctx.fillRect(0,0,canvas.width,canvas.height);

// tiles
const objs=[];
for(let y=0;y<map.length;y++){
for(let x=0;x<map[y].length;x++){
objs.push({x,y,t:map[y][x]});
}
}
objs.sort((a,b)=>(a.x+a.y)-(b.x+b.y));

// camera applied
const ccx=cx - (camX-camY)*52*0.9;
const ccy=cy - (camX+camY)*52*0.45;

for(const o of objs){
const [px,py]=iso(o.x,o.y,ccx,ccy);

let col="#111";
if(o.t==="#")col="#2a2a3a";
if(o.t==="D")col="#4af";
if(o.t==="E")col="#f55";
if(o.t==="N")col="#6a6";
if(o.t==="B")col="#ff0";

ctx.shadowColor=col;
ctx.shadowBlur=14;

ctx.fillStyle=col;
ctx.beginPath();
ctx.moveTo(px,py);
ctx.lineTo(px+26,py+13);
ctx.lineTo(px,py+26);
ctx.lineTo(px-26,py+13);
ctx.closePath();
ctx.fill();

ctx.shadowBlur=0;
}

// player (square HD-2D)
const [px,py]=iso(player.x,player.y,ccx,ccy);

ctx.shadowColor="#fff";
ctx.shadowBlur=20;

ctx.fillStyle="#fff";
ctx.fillRect(px-10,py-10,20,20);

// face
ctx.fillStyle="#000";
ctx.fillRect(px-5,py-5,3,3);
ctx.fillRect(px+2,py-5,3,3);
}

// ================= MINIMAP =================
function drawMini(){
mctx.clearRect(0,0,150,150);

for(let y=0;y<map.length;y++){
for(let x=0;x<map[y].length;x++){
let c="#222";
if(map[y][x]==="#")c="#444";
if(map[y][x]==="E")c="#f55";
if(map[y][x]==="N")c="#6a6";
if(map[y][x]==="D")c="#4af";
if(map[y][x]==="B")c="#ff0";

mctx.fillStyle=c;
mctx.fillRect(x*10,y*10,10,10);
}
}

mctx.fillStyle="#fff";
mctx.fillRect(player.x*10,player.y*10,10,10);
}

// ================= LOOP =================
function loop(){
update();
updateCamera();
draw();
drawMini();
requestAnimationFrame(loop);
}
loop();

// ================= INIT =================
document.getElementById("topBar").innerText=stages[0].name;
enqueue("記憶世界へようこそ");
enqueue("矢印で移動 / Enterで行動");
enqueue("D=進行 / E=敵 / B=ボス");
</script>

</body>
</html>
