<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>オープンワールド・フライトシューティング</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #04131b; color: #c8f1ff; font-family: system-ui, sans-serif; }
    canvas { display: block; }
    #hud { position: absolute; left: 16px; top: 16px; z-index: 10; line-height: 1.5; font-size: 16px; letter-spacing: 0.03em; }
    #hud b { color: #91ffff; }
    #crosshair {
      position: absolute; left: 50%; top: 50%; width: 32px; height: 32px;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,0.8);
    }
    #crosshair::before { left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%); }
    #crosshair::after { top: 50%; left: 0; width: 100%; height: 2px; transform: translateY(-50%); }
    #radar {
      position: absolute; right: 16px; bottom: 16px; width: 220px; height: 220px; background: rgba(2,18,29,0.85); border: 1px solid rgba(145,255,255,0.3); border-radius: 12px; z-index: 10;
      image-rendering: pixelated;
    }
    #help { position: absolute; left: 16px; bottom: 16px; z-index: 10; font-size: 14px; color: rgba(200,241,255,0.75); }
  </style>
</head>
<body>
  <div id="hud"><div><b>SCORE:</b> <span id="score">0</span></div><div><b>HP:</b> <span id="hp">100</span></div></div>
  <div id="crosshair"></div>
  <canvas id="radar" width="220" height="220"></canvas>
  <div id="help">W/S: ピッチ / A/D: ヨー・ロール / SPACE: レーザー</div>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    // シーンの初期化
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x04131b, 0.0007);

    const camera = new THREE.PerspectiveCamera(68, window.innerWidth / window.innerHeight, 0.1, 5000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x04131b);
    document.body.appendChild(renderer.domElement);

    // ライト配置
    const ambientLight = new THREE.AmbientLight(0x9acbe6, 0.6);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(50, 120, 30);
    scene.add(directionalLight);
    const rimLight = new THREE.DirectionalLight(0x99ccff, 0.25);
    rimLight.position.set(-80, 80, -80);
    scene.add(rimLight);

    // 地面・グリッド
    const groundGeo = new THREE.PlaneGeometry(2500, 2500, 100, 100);
    const groundMat = new THREE.MeshPhongMaterial({ color: 0x12332b, flatShading: true, side: THREE.DoubleSide });
    const groundMesh = new THREE.Mesh(groundGeo, groundMat);
    groundMesh.rotation.x = -Math.PI / 2;
    scene.add(groundMesh);

    const grid = new THREE.GridHelper(2500, 100, 0x0c3f3c, 0x082c24);
    grid.material.opacity = 0.7;
    grid.material.transparent = true;
    scene.add(grid);

    // プレイヤー機体
    const player = new THREE.Group();
    const bodyMat = new THREE.MeshPhongMaterial({ color: 0x76d6ff, flatShading: true });
    const wingMat = new THREE.MeshPhongMaterial({ color: 0x55a5ff, flatShading: true });

    const fuselage = new THREE.ConeGeometry(4, 16, 6);
    const fuselageMesh = new THREE.Mesh(fuselage, bodyMat);
    fuselageMesh.rotation.x = Math.PI / 2;
    player.add(fuselageMesh);

    const wingLeft = new THREE.BoxGeometry(2, 0.8, 16);
    const wingLeftMesh = new THREE.Mesh(wingLeft, wingMat);
    wingLeftMesh.position.set(-6, 0, -1);
    wingLeftMesh.rotation.z = Math.PI / 8;
    player.add(wingLeftMesh);

    const wingRight = wingLeftMesh.clone();
    wingRight.position.set(6, 0, -1);
    wingRight.rotation.z = -Math.PI / 8;
    player.add(wingRight);

    const tail = new THREE.CylinderGeometry(1.5, 1.5, 4, 6);
    const tailMesh = new THREE.Mesh(tail, bodyMat);
    tailMesh.rotation.x = Math.PI / 2;
    tailMesh.position.set(0, 0, 5);
    player.add(tailMesh);

    player.position.set(0, 30, 0);
    scene.add(player);

    player.userData.velocity = new THREE.Vector3(0, 0, -1);
    player.userData.speed = 140;
    player.userData.hp = 100;
    player.userData.score = 0;
    player.userData.yawAngle = 0;
    player.userData.yawVelocity = 0;
    player.userData.pitchVelocity = 0;
    player.userData.currentPitch = 0;
    player.userData.currentBank = 0;

    // 敵ターゲットと建造物
    const targets = [];
    const targetGroup = new THREE.Group();
    scene.add(targetGroup);

    function createTower() {
      const tower = new THREE.Group();
      const towerBase = new THREE.CylinderGeometry(5, 8, 26, 6);
      const towerMesh = new THREE.Mesh(towerBase, new THREE.MeshPhongMaterial({ color: 0x7932e8, flatShading: true }));
      towerMesh.position.y = 13;
      tower.add(towerMesh);
      const ring = new THREE.TorusGeometry(7, 1.2, 6, 16);
      const ringMesh = new THREE.Mesh(ring, new THREE.MeshPhongMaterial({ color: 0xe8b84f, flatShading: true }));
      ringMesh.rotation.x = Math.PI / 2;
      ringMesh.position.y = 25;
      tower.add(ringMesh);
      return tower;
    }

    function createCrystal() {
      const geo = new THREE.OctahedronGeometry(4);
      const mat = new THREE.MeshPhongMaterial({ color: 0xff77d6, flatShading: true, emissive: 0x330033, emissiveIntensity: 0.3 });
      return new THREE.Mesh(geo, mat);
    }

    function addTargets() {
      for (let i = 0; i < 48; i++) {
        const tower = createTower();
        const angle = Math.random() * Math.PI * 2;
        const radius = 220 + Math.random() * 1000;
        tower.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
        tower.position.y = 13;
        tower.rotation.y = Math.random() * Math.PI * 2;
        targetGroup.add(tower);
        targets.push({ mesh: tower, type: 'tower', alive: true, radius: 12 });
      }
      for (let i = 0; i < 42; i++) {
        const crystal = createCrystal();
        const angle = Math.random() * Math.PI * 2;
        const radius = 180 + Math.random() * 900;
        crystal.position.set(Math.cos(angle) * radius, 16 + Math.random() * 120, Math.sin(angle) * radius);
        crystal.rotation.set(Math.random() * 2, Math.random() * 2, Math.random() * 2);
        targetGroup.add(crystal);
        targets.push({ mesh: crystal, type: 'crystal', alive: true, radius: 6 });
      }
    }
    addTargets();

    // レーザー（弾）
    const lasers = [];
    function fireLaser() {
      const geometry = new THREE.CylinderGeometry(0.4, 0.4, 12, 6);
      const material = new THREE.MeshBasicMaterial({ color: 0xff6565 });
      const laser = new THREE.Mesh(geometry, material);
      laser.rotation.x = Math.PI / 2;
      const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(player.quaternion);
      laser.position.copy(player.position).addScaledVector(forward, 12);
      laser.quaternion.copy(player.quaternion);
      laser.userData = { velocity: forward.clone().multiplyScalar(220), life: 2.2 };
      scene.add(laser);
      lasers.push(laser);
    }

    // 操作状態
    const input = { forward: 0, yaw: 0, roll: 0, fired: false };
    window.addEventListener('keydown', (event) => {
      switch (event.code) {
        case 'KeyW': case 'ArrowUp': input.forward = 1; break;
        case 'KeyS': case 'ArrowDown': input.forward = -1; break;
        case 'KeyA': case 'ArrowLeft': input.yaw = 1; input.roll = 1; break;
        case 'KeyD': case 'ArrowRight': input.yaw = -1; input.roll = -1; break;
        case 'Space': if (!input.fired) { fireLaser(); input.fired = true; } break;
      }
    });
    window.addEventListener('keyup', (event) => {
      switch (event.code) {
        case 'KeyW': case 'ArrowUp': if (input.forward === 1) input.forward = 0; break;
        case 'KeyS': case 'ArrowDown': if (input.forward === -1) input.forward = 0; break;
        case 'KeyA': case 'ArrowLeft': if (input.yaw === 1) input.yaw = 0; if (input.roll === 1) input.roll = 0; break;
        case 'KeyD': case 'ArrowRight': if (input.yaw === -1) input.yaw = 0; if (input.roll === -1) input.roll = 0; break;
        case 'Space': input.fired = false; break;
      }
    });

    // レーダー描画準備
    const radarCanvas = document.getElementById('radar');
    const radarCtx = radarCanvas.getContext('2d');
    const radarRadius = radarCanvas.width / 2 - 12;

    function drawRadar() {
      radarCtx.clearRect(0, 0, radarCanvas.width, radarCanvas.height);
      radarCtx.fillStyle = 'rgba(1, 17, 28, 0.84)';
      radarCtx.fillRect(0, 0, radarCanvas.width, radarCanvas.height);
      radarCtx.strokeStyle = 'rgba(145,255,255,0.24)';
      radarCtx.lineWidth = 2;
      radarCtx.beginPath();
      radarCtx.arc(radarCanvas.width / 2, radarCanvas.height / 2, radarRadius, 0, Math.PI * 2);
      radarCtx.stroke();
      radarCtx.beginPath();
      radarCtx.arc(radarCanvas.width / 2, radarCanvas.height / 2, radarRadius * 0.5, 0, Math.PI * 2);
      radarCtx.stroke();
      radarCtx.beginPath();
      radarCtx.moveTo(radarCanvas.width / 2 - radarRadius, radarCanvas.height / 2);
      radarCtx.lineTo(radarCanvas.width / 2 + radarRadius, radarCanvas.height / 2);
      radarCtx.moveTo(radarCanvas.width / 2, radarCanvas.height / 2 - radarRadius);
      radarCtx.lineTo(radarCanvas.width / 2, radarCanvas.height / 2 + radarRadius);
      radarCtx.stroke();

      // 自機方向
      const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(player.quaternion);
      radarCtx.strokeStyle = 'rgba(141,255,220,0.9)';
      radarCtx.lineWidth = 3;
      radarCtx.beginPath();
      radarCtx.moveTo(radarCanvas.width / 2, radarCanvas.height / 2);
      radarCtx.lineTo(radarCanvas.width / 2 + forward.x * radarRadius, radarCanvas.height / 2 - forward.z * radarRadius);
      radarCtx.stroke();

      // ターゲット描画
      targets.forEach((target) => {
        if (!target.alive) return;
        const dx = target.mesh.position.x - player.position.x;
        const dz = target.mesh.position.z - player.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist > 1400) return;
        const ratio = Math.min(dist / 1400, 1);
        const angle = Math.atan2(dz, dx);
        const x = radarCanvas.width / 2 + Math.cos(angle) * ratio * radarRadius;
        const y = radarCanvas.height / 2 - Math.sin(angle) * ratio * radarRadius;
        radarCtx.fillStyle = target.type === 'tower' ? '#ff8888' : '#aaffff';
        radarCtx.beginPath();
        radarCtx.arc(x, y, 4, 0, Math.PI * 2);
        radarCtx.fill();
      });
    }

    // 衝突判定とHP処理
    function checkCollision() {
      const height = player.position.y;
      if (height < 4) {
        player.userData.hp -= 0.2;
        player.position.y = 4;
        player.userData.speed = Math.max(player.userData.speed * 0.98, 0.8);
      }

      targets.forEach((target) => {
        if (!target.alive) return;
        const distance = target.mesh.position.distanceTo(player.position);
        if (distance < target.radius + 5) {
          target.alive = false;
          targetGroup.remove(target.mesh);
          scene.remove(target.mesh);
          player.userData.hp -= 12;
        }
      });
      player.userData.hp = Math.max(player.userData.hp, 0);
    }

    // レーザーとターゲットの当たり判定
    function updateLasers(delta) {
      for (let i = lasers.length - 1; i >= 0; i--) {
        const laser = lasers[i];
        laser.position.addScaledVector(laser.userData.velocity, delta);
        laser.userData.life -= delta;
        if (laser.userData.life <= 0) {
          scene.remove(laser);
          lasers.splice(i, 1);
          continue;
        }
        for (const target of targets) {
          if (!target.alive) continue;
          const d = laser.position.distanceTo(target.mesh.position);
          if (d < target.radius + 2) {
            target.alive = false;
            targetGroup.remove(target.mesh);
            scene.remove(target.mesh);
            player.userData.score += target.type === 'tower' ? 140 : 80;
            document.getElementById('score').textContent = player.userData.score;
            scene.remove(laser);
            lasers.splice(i, 1);
            break;
          }
        }
      }
    }

    // カメラ追従
    const cameraLookAt = new THREE.Vector3();
    function updateCamera() {
      // 目標カメラ位置をプレイヤー後方に設定
      const followOffset = new THREE.Vector3(0, 18, 42).applyQuaternion(player.quaternion);
      const desiredPosition = player.position.clone().add(followOffset);
      camera.position.lerp(desiredPosition, 0.1);

      // カメラがプレイヤーの前方を見続けるようにする
      const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(player.quaternion);
      cameraLookAt.copy(player.position).add(forward.multiplyScalar(24)).add(new THREE.Vector3(0, 7, 0));
      const desiredQuat = new THREE.Quaternion().setFromRotationMatrix(
        new THREE.Matrix4().lookAt(camera.position, cameraLookAt, new THREE.Vector3(0, 1, 0))
      );
      camera.quaternion.slerp(desiredQuat, 0.12);
    }

    // 画面サイズ
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();

    function animate() {
      const delta = Math.min(clock.getDelta(), 0.033);

      const maxYawSpeed = 1.8;
      const maxPitchSpeed = 1.1;
      const targetBankAngle = THREE.MathUtils.degToRad(38);

      // 入力から目標角速度を計算し、慣性を持たせて滑らかに変化
      const desiredYawVelocity = input.yaw * maxYawSpeed;
      const desiredPitchVelocity = input.forward * maxPitchSpeed;
      player.userData.yawVelocity = THREE.MathUtils.lerp(player.userData.yawVelocity, desiredYawVelocity, 0.16);
      player.userData.pitchVelocity = THREE.MathUtils.lerp(player.userData.pitchVelocity, desiredPitchVelocity, 0.14);

      player.userData.yawAngle += player.userData.yawVelocity * delta;
      player.userData.currentPitch = THREE.MathUtils.lerp(
        player.userData.currentPitch,
        input.forward * THREE.MathUtils.degToRad(20),
        4.6 * delta
      );

      // 旋回時のバンク角を滑らかに補間
      const desiredBank = -input.yaw * targetBankAngle;
      player.userData.currentBank = THREE.MathUtils.lerp(player.userData.currentBank, desiredBank, 5.4 * delta);

      // 回転を組み合わせて機体姿勢を設定
      const qYaw = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), player.userData.yawAngle);
      const qPitch = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), player.userData.currentPitch);
      const qBank = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), player.userData.currentBank);
      player.quaternion.copy(qYaw).multiply(qPitch).multiply(qBank);

      // 慣性的な移動: 速度ベクトルが機首方向へ滑らかに追従する
      const forwardVector = new THREE.Vector3(0, 0, -1).applyQuaternion(player.quaternion);
      const desiredVelocity = forwardVector.clone().multiplyScalar(player.userData.speed);
      player.userData.velocity.lerp(desiredVelocity, Math.min(delta * 3.8, 1));
      player.position.addScaledVector(player.userData.velocity, delta);

      // 機首の上下動にも慣性を感じさせるため、ピッチ入力と実際の姿勢を補間
      player.position.y = THREE.MathUtils.clamp(player.position.y, 5, 320);

      checkCollision();
      updateLasers(delta);
      updateCamera();
      drawRadar();
      renderer.render(scene, camera);

      if (player.userData.hp <= 0) {
        document.getElementById('hp').textContent = 0;
        return;
      }
      document.getElementById('hp').textContent = Math.floor(player.userData.hp);
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
