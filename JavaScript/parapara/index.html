<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パラパラ漫画エディタ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f0f0;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }
        
        .toolbar {
            background: #fff;
            padding: 12px 16px;
            border-bottom: 1px solid #ddd;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        .canvas-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #eee;
            padding: 20px;
            position: relative;
        }
        
        canvas {
            background: white;
            border: 2px solid #999;
            cursor: crosshair;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 100%;
            max-height: 100%;
            image-rendering: pixelated;
        }
        
        .sidebar {
            width: 220px;
            background: #fff;
            border-left: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .sidebar-header {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            font-weight: bold;
            font-size: 14px;
        }
        
        .frames-container {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        
        .frame-item {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            margin-bottom: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 4px;
            overflow: hidden;
            background: #fff;
            transition: border-color 0.2s;
        }
        
        .frame-item.active {
            border-color: #4CAF50;
            box-shadow: 0 0 0 2px #4CAF5033;
        }
        
        .frame-item:hover {
            border-color: #999;
        }
        
        .frame-thumbnail {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
        }
        
        .frame-number {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 10px;
            padding: 2px 4px;
            border-radius: 2px;
        }
        
        .frame-actions {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            gap: 4px;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .frame-item:hover .frame-actions {
            display: flex;
            opacity: 1;
        }
        
        .frame-actions button {
            padding: 6px 8px;
            font-size: 11px;
            background: #333;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .frame-actions button:hover {
            background: #555;
        }
        
        .btn {
            padding: 8px 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
            white-space: nowrap;
            min-width: 50px;
        }
        
        .btn:hover {
            background: #45a049;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn.secondary {
            background: #2196F3;
        }
        
        .btn.secondary:hover {
            background: #0b7dda;
        }
        
        .btn.danger {
            background: #f44336;
        }
        
        .btn.danger:hover {
            background: #da190b;
        }
        
        .tool-button {
            padding: 8px 10px;
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            min-width: 50px;
        }
        
        .tool-button.active {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }
        
        .tool-button:hover {
            border-color: #4CAF50;
        }
        
        .controls-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        input[type="range"] {
            width: 100px;
            height: 6px;
        }
        
        input[type="color"] {
            width: 40px;
            height: 36px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .status {
            font-size: 12px;
            color: #666;
            white-space: nowrap;
            margin-left: auto;
            padding: 0 12px;
        }
        
        .divider {
            width: 1px;
            height: 24px;
            background: #ddd;
        }
        
        .add-frame-btn {
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            margin-bottom: 8px;
        }
        
        .add-frame-btn:hover {
            background: #45a049;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 90%;
        }

        .modal-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 16px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .label-text {
            font-size: 12px;
            color: #666;
        }

        .tooltip {
            font-size: 11px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="toolbar">
            <button class="tool-button active" id="penTool" title="ペン">✏️</button>
            <button class="tool-button" id="eraserTool" title="消しゴム">🧹</button>
            <button class="tool-button" id="rectangleTool" title="四角形">▭</button>
            <button class="tool-button" id="circleTool" title="円">●</button>
            <button class="tool-button" id="fillTool" title="塗りつぶし">🪣</button>
            
            <div class="divider"></div>
            
            <div class="controls-group">
                <input type="color" id="colorPicker" value="#000000">
                <input type="range" id="sizeSlider" min="1" max="50" value="5">
                <span class="label-text" id="sizeValue">5</span>
            </div>
            
            <div class="divider"></div>
            
            <button class="btn" id="clearBtn">🗑️</button>
            <button class="btn secondary" id="playBtn">▶️</button>
            
            <div class="controls-group">
                <input type="range" id="fpsSlider" min="1" max="30" value="10" style="width: 80px;">
                <span class="label-text" id="fpsValue">10fps</span>
            </div>
            
            <div class="divider"></div>
            
            <label style="display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer;">
                <input type="checkbox" id="onionSkinToggle" style="cursor: pointer;">
                <span>onion</span>
            </label>
            
            <span class="status" id="status">1/1</span>
        </div>

        <div class="main">
            <div class="canvas-area">
                <canvas id="canvas" width="800" height="600"></canvas>
            </div>
            
            <div class="sidebar">
                <div class="sidebar-header">📽️ フレーム</div>
                <button class="add-frame-btn" id="addFrameBtn">+ 追加</button>
                <div class="frames-container" id="framesContainer"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <div class="modal-header" id="modalHeader">確認</div>
            <div id="modalMessage"></div>
            <div class="modal-buttons">
                <button class="btn secondary" id="modalCancel">キャンセル</button>
                <button class="btn danger" id="modalConfirm">削除</button>
            </div>
        </div>
    </div>

    <script>
        // Canvas and Context
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        // UI Elements
        const penTool = document.getElementById('penTool');
        const eraserTool = document.getElementById('eraserTool');
        const rectangleTool = document.getElementById('rectangleTool');
        const circleTool = document.getElementById('circleTool');
        const fillTool = document.getElementById('fillTool');
        const colorPicker = document.getElementById('colorPicker');
        const sizeSlider = document.getElementById('sizeSlider');
        const sizeValue = document.getElementById('sizeValue');
        const clearBtn = document.getElementById('clearBtn');
        const playBtn = document.getElementById('playBtn');
        const fpsSlider = document.getElementById('fpsSlider');
        const fpsValue = document.getElementById('fpsValue');
        const addFrameBtn = document.getElementById('addFrameBtn');
        const framesContainer = document.getElementById('framesContainer');
        const status = document.getElementById('status');
        const onionSkinToggle = document.getElementById('onionSkinToggle');
        const confirmModal = document.getElementById('confirmModal');
        const modalCancel = document.getElementById('modalCancel');
        const modalConfirm = document.getElementById('modalConfirm');

        // State
        let frames = [];
        let currentFrameIndex = 0;
        let tool = 'pen';
        let isDrawing = false;
        let isPlaying = false;
        let pendingDeleteIndex = -1;
        let lastX = 0;
        let lastY = 0;
        let shapeStartX = 0;
        let shapeStartY = 0;
        let previewImageData = null;

        // Initialize
        function init() {
            addNewFrame();
            setupEventListeners();
            updateFramesDisplay();
        }

        function setupEventListeners() {
            // Tool Selection
            penTool.addEventListener('click', () => selectTool('pen'));
            eraserTool.addEventListener('click', () => selectTool('eraser'));
            rectangleTool.addEventListener('click', () => selectTool('rectangle'));
            circleTool.addEventListener('click', () => selectTool('circle'));
            fillTool.addEventListener('click', () => selectTool('fill'));
            
            // Canvas
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);
            canvas.addEventListener('touchstart', handleTouchStart, false);
            canvas.addEventListener('touchmove', handleTouchMove, false);
            canvas.addEventListener('touchend', stopDrawing, false);
            
            // Controls
            colorPicker.addEventListener('change', () => {});
            sizeSlider.addEventListener('input', (e) => {
                sizeValue.textContent = e.target.value;
            });
            
            fpsSlider.addEventListener('input', (e) => {
                fpsValue.textContent = e.target.value + 'fps';
            });
            
            clearBtn.addEventListener('click', clearCurrentFrame);
            playBtn.addEventListener('click', togglePlayback);
            addFrameBtn.addEventListener('click', addNewFrame);
            onionSkinToggle.addEventListener('change', refreshCanvas);
            
            // Modal
            modalCancel.addEventListener('click', closeModal);
            modalConfirm.addEventListener('click', confirmDelete);
        }

        function selectTool(toolName) {
            tool = toolName;
            penTool.classList.toggle('active', tool === 'pen');
            eraserTool.classList.toggle('active', tool === 'eraser');
            rectangleTool.classList.toggle('active', tool === 'rectangle');
            circleTool.classList.toggle('active', tool === 'circle');
            fillTool.classList.toggle('active', tool === 'fill');
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (e.clientX - rect.left) * (canvas.width / rect.width),
                y: (e.clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function getTouchPos(touch) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (touch.clientX - rect.left) * (canvas.width / rect.width),
                y: (touch.clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function startDrawing(e) {
            const pos = getMousePos(e);
            lastX = pos.x;
            lastY = pos.y;
            shapeStartX = pos.x;
            shapeStartY = pos.y;
            isDrawing = true;
            
            if (tool === 'rectangle' || tool === 'circle') {
                previewImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            }
        }

        function handleTouchStart(e) {
            if (e.touches.length === 1) {
                const pos = getTouchPos(e.touches[0]);
                lastX = pos.x;
                lastY = pos.y;
                shapeStartX = pos.x;
                shapeStartY = pos.y;
                isDrawing = true;
                
                if (tool === 'rectangle' || tool === 'circle') {
                    previewImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                }
            }
        }

        function draw(e) {
            if (!isDrawing) return;
            
            const pos = getMousePos(e);
            
            if (tool === 'pen' || tool === 'eraser') {
                drawLine(lastX, lastY, pos.x, pos.y);
                lastX = pos.x;
                lastY = pos.y;
            } else if (tool === 'rectangle' || tool === 'circle') {
                // Preview shape
                ctx.putImageData(previewImageData, 0, 0);
                drawShape(shapeStartX, shapeStartY, pos.x, pos.y);
            }
        }

        function handleTouchMove(e) {
            if (!isDrawing || e.touches.length !== 1) return;
            e.preventDefault();
            
            const pos = getTouchPos(e.touches[0]);
            
            if (tool === 'pen' || tool === 'eraser') {
                drawLine(lastX, lastY, pos.x, pos.y);
                lastX = pos.x;
                lastY = pos.y;
            } else if (tool === 'rectangle' || tool === 'circle') {
                ctx.putImageData(previewImageData, 0, 0);
                drawShape(shapeStartX, shapeStartY, pos.x, pos.y);
            }
        }

        function drawLine(fromX, fromY, toX, toY) {
            const size = parseInt(sizeSlider.value);
            ctx.lineWidth = size;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            if (tool === 'eraser') {
                ctx.clearRect(fromX - size/2, fromY - size/2, size, size);
                ctx.clearRect(toX - size/2, toY - size/2, size, size);
            } else {
                ctx.strokeStyle = colorPicker.value;
                ctx.beginPath();
                ctx.moveTo(fromX, fromY);
                ctx.lineTo(toX, toY);
                ctx.stroke();
            }
            
            saveCurrentFrame();
        }

        function drawShape(x1, y1, x2, y2) {
            const size = parseInt(sizeSlider.value);
            ctx.strokeStyle = colorPicker.value;
            ctx.lineWidth = size;
            
            if (tool === 'rectangle') {
                ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
            } else if (tool === 'circle') {
                const radius = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
                ctx.beginPath();
                ctx.arc(x1, y1, radius, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        function stopDrawing() {
            if (isDrawing && (tool === 'rectangle' || tool === 'circle')) {
                saveCurrentFrame();
            }
            isDrawing = false;
            previewImageData = null;
        }

        function floodFill(x, y, color) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const targetColor = getPixelColor(data, x, y);
            const fillColor = hexToRgba(color);
            
            if (colorsEqual(targetColor, fillColor)) return;
            
            const queue = [[Math.floor(x), Math.floor(y)]];
            const visited = new Set();
            
            while (queue.length > 0) {
                const [px, py] = queue.shift();
                const key = `${px},${py}`;
                
                if (visited.has(key) || px < 0 || px >= canvas.width || py < 0 || py >= canvas.height) {
                    continue;
                }
                
                visited.add(key);
                const pixelColor = getPixelColor(data, px, py);
                
                if (!colorsEqual(pixelColor, targetColor)) {
                    continue;
                }
                
                setPixelColor(data, px, py, fillColor);
                queue.push([px + 1, py], [px - 1, py], [px, py + 1], [px, py - 1]);
            }
            
            ctx.putImageData(imageData, 0, 0);
            saveCurrentFrame();
        }

        function getPixelColor(data, x, y) {
            const index = (Math.floor(y) * canvas.width + Math.floor(x)) * 4;
            return [data[index], data[index + 1], data[index + 2], data[index + 3]];
        }

        function setPixelColor(data, x, y, color) {
            const index = (Math.floor(y) * canvas.width + Math.floor(x)) * 4;
            data[index] = color[0];
            data[index + 1] = color[1];
            data[index + 2] = color[2];
            data[index + 3] = color[3];
        }

        function colorsEqual(c1, c2) {
            return c1[0] === c2[0] && c1[1] === c2[1] && c1[2] === c2[2] && c1[3] === c2[3];
        }

        function hexToRgba(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return [r, g, b, 255];
        }

        function addNewFrame() {
            const frameData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            frames.push(frameData);
            currentFrameIndex = frames.length - 1;
            updateFramesDisplay();
            updateStatus();
        }

        function clearCurrentFrame() {
            if (confirm('クリアしますか？')) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                saveCurrentFrame();
                updateFramesDisplay();
            }
        }

        function saveCurrentFrame() {
            frames[currentFrameIndex] = ctx.getImageData(0, 0, canvas.width, canvas.height);
        }

        function refreshCanvas() {
            loadFrameToCanvas(currentFrameIndex);
        }

        function loadFrameToCanvas(frameIndex) {
            if (frameIndex >= 0 && frameIndex < frames.length) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if (onionSkinToggle.checked && frameIndex > 0) {
                    ctx.globalAlpha = 0.3;
                    ctx.putImageData(frames[frameIndex - 1], 0, 0);
                    ctx.globalAlpha = 1;
                }
                
                ctx.putImageData(frames[frameIndex], 0, 0);
                currentFrameIndex = frameIndex;
                updateFramesDisplay();
                updateStatus();
            }
        }

        function updateFramesDisplay() {
            framesContainer.innerHTML = '';
            frames.forEach((frameData, index) => {
                const frameDiv = document.createElement('div');
                frameDiv.className = 'frame-item';
                if (index === currentFrameIndex) {
                    frameDiv.classList.add('active');
                }
                
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = canvas.width;
                tempCanvas.height = canvas.height;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.putImageData(frameData, 0, 0);
                
                const img = document.createElement('img');
                img.className = 'frame-thumbnail';
                img.src = tempCanvas.toDataURL();
                frameDiv.appendChild(img);
                
                const numberDiv = document.createElement('div');
                numberDiv.className = 'frame-number';
                numberDiv.textContent = index + 1;
                frameDiv.appendChild(numberDiv);
                
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'frame-actions';
                
                const dupBtn = document.createElement('button');
                dupBtn.textContent = 'dup';
                dupBtn.onclick = (e) => {
                    e.stopPropagation();
                    duplicateFrame(index);
                };
                
                const delBtn = document.createElement('button');
                delBtn.textContent = 'del';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    showDeleteConfirm(index);
                };
                
                actionsDiv.appendChild(dupBtn);
                actionsDiv.appendChild(delBtn);
                frameDiv.appendChild(actionsDiv);
                
                frameDiv.addEventListener('click', () => {
                    loadFrameToCanvas(index);
                });
                
                framesContainer.appendChild(frameDiv);
            });
        }

        function duplicateFrame(index) {
            const newFrameData = new ImageData(
                new Uint8ClampedArray(frames[index].data),
                frames[index].width,
                frames[index].height
            );
            frames.splice(index + 1, 0, newFrameData);
            currentFrameIndex = index + 1;
            updateFramesDisplay();
            updateStatus();
        }

        function showDeleteConfirm(index) {
            pendingDeleteIndex = index;
            document.getElementById('modalHeader').textContent = 'フレーム削除';
            document.getElementById('modalMessage').textContent = 'このフレームを削除しますか？';
            confirmModal.classList.add('active');
        }

        function closeModal() {
            confirmModal.classList.remove('active');
            pendingDeleteIndex = -1;
        }

        function confirmDelete() {
            if (pendingDeleteIndex >= 0) {
                frames.splice(pendingDeleteIndex, 1);
                if (frames.length === 0) {
                    addNewFrame();
                } else {
                    currentFrameIndex = Math.min(pendingDeleteIndex, frames.length - 1);
                    loadFrameToCanvas(currentFrameIndex);
                }
            }
            closeModal();
        }

        function updateStatus() {
            status.textContent = `${currentFrameIndex + 1}/${frames.length}`;
        }

        function togglePlayback() {
            isPlaying = !isPlaying;
            playBtn.style.background = isPlaying ? '#ff9800' : '';
            playBtn.style.color = isPlaying ? 'white' : '';
            
            if (isPlaying) {
                playAnimation();
            }
        }

        async function playAnimation() {
            const fps = parseInt(fpsSlider.value);
            const frameTime = 1000 / fps;
            let frameIndex = 0;

            while (isPlaying) {
                loadFrameToCanvas(frameIndex);
                await new Promise(resolve => setTimeout(resolve, frameTime));
                frameIndex = (frameIndex + 1) % frames.length;
            }
        }

        canvas.addEventListener('click', (e) => {
            if (tool === 'fill') {
                const pos = getMousePos(e);
                floodFill(pos.x, pos.y, colorPicker.value);
            }
        });

        // Start
        init();
    </script>
</body>
</html>
