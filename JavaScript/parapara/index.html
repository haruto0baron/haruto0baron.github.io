<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パラパラ漫画エディタ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f0f0;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }
        
        .toolbar {
            background: #fff;
            padding: 12px 16px;
            border-bottom: 1px solid #ddd;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        .canvas-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #eee;
            padding: 20px;
        }
        
        canvas {
            background: white;
            border: 2px solid #999;
            cursor: crosshair;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 100%;
            max-height: 100%;
        }
        
        .sidebar {
            width: 220px;
            background: #fff;
            border-left: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .sidebar-header {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            font-weight: bold;
            font-size: 14px;
        }
        
        .frames-container {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        
        .frame-item {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            margin-bottom: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 4px;
            overflow: hidden;
            background: #fff;
            transition: border-color 0.2s;
        }
        
        .frame-item.active {
            border-color: #4CAF50;
            box-shadow: 0 0 0 2px #4CAF5033;
        }
        
        .frame-item:hover {
            border-color: #999;
        }
        
        .frame-thumbnail {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .frame-number {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 10px;
            padding: 2px 4px;
            border-radius: 2px;
        }
        
        .frame-actions {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            gap: 4px;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .frame-item:hover .frame-actions {
            display: flex;
            opacity: 1;
        }
        
        .frame-actions button {
            padding: 6px 8px;
            font-size: 12px;
            background: #333;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .frame-actions button:hover {
            background: #555;
        }
        
        .btn {
            padding: 8px 16px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            white-space: nowrap;
        }
        
        .btn:hover {
            background: #45a049;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn.secondary {
            background: #2196F3;
        }
        
        .btn.secondary:hover {
            background: #0b7dda;
        }
        
        .btn.danger {
            background: #f44336;
        }
        
        .btn.danger:hover {
            background: #da190b;
        }
        
        .tool-button {
            padding: 8px 12px;
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .tool-button.active {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }
        
        .tool-button:hover {
            border-color: #4CAF50;
        }
        
        .slider-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        input[type="range"] {
            width: 120px;
        }
        
        .status {
            font-size: 12px;
            color: #666;
            white-space: nowrap;
        }
        
        .divider {
            width: 1px;
            height: 24px;
            background: #ddd;
        }
        
        .add-frame-btn {
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            margin-bottom: 8px;
        }
        
        .add-frame-btn:hover {
            background: #45a049;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 90%;
        }

        .modal-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 16px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .onion-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .onion-toggle input {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="toolbar">
            <button class="tool-button active" id="penTool">✏️ ペン</button>
            <button class="tool-button" id="eraserTool">🧹 消しゴム</button>
            
            <div class="divider"></div>
            
            <div class="slider-group">
                <label for="sizeSlider">サイズ:</label>
                <input type="range" id="sizeSlider" min="1" max="50" value="5">
                <span id="sizeValue">5</span>
            </div>
            
            <div class="divider"></div>
            
            <button class="btn" id="clearBtn">🗑️ クリア</button>
            <button class="btn secondary" id="playBtn">▶️ 再生</button>
            
            <div class="divider"></div>
            
            <div class="slider-group">
                <label for="fpsSlider">速度:</label>
                <input type="range" id="fpsSlider" min="1" max="30" value="10">
                <span id="fpsValue">10 FPS</span>
            </div>
            
            <div class="divider"></div>
            
            <label class="onion-toggle">
                <input type="checkbox" id="onionSkinToggle">
                <span>前フレーム表示</span>
            </label>
            
            <div style="flex: 1;"></div>
            
            <span class="status" id="status">フレーム: 1/1</span>
        </div>

        <div class="main">
            <div class="canvas-area">
                <canvas id="canvas" width="800" height="600"></canvas>
            </div>
            
            <div class="sidebar">
                <div class="sidebar-header">フレーム一覧</div>
                <button class="add-frame-btn" id="addFrameBtn">+ フレーム追加</button>
                <div class="frames-container" id="framesContainer"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <div class="modal-header" id="modalHeader">確認</div>
            <div id="modalMessage"></div>
            <div class="modal-buttons">
                <button class="btn secondary" id="modalCancel">キャンセル</button>
                <button class="btn danger" id="modalConfirm">削除</button>
            </div>
        </div>
    </div>

    <script>
        // Canvas and Context
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // UI Elements
        const penTool = document.getElementById('penTool');
        const eraserTool = document.getElementById('eraserTool');
        const sizeSlider = document.getElementById('sizeSlider');
        const sizeValue = document.getElementById('sizeValue');
        const clearBtn = document.getElementById('clearBtn');
        const playBtn = document.getElementById('playBtn');
        const fpsSlider = document.getElementById('fpsSlider');
        const fpsValue = document.getElementById('fpsValue');
        const addFrameBtn = document.getElementById('addFrameBtn');
        const framesContainer = document.getElementById('framesContainer');
        const status = document.getElementById('status');
        const onionSkinToggle = document.getElementById('onionSkinToggle');
        const confirmModal = document.getElementById('confirmModal');
        const modalCancel = document.getElementById('modalCancel');
        const modalConfirm = document.getElementById('modalConfirm');

        // State
        let frames = [];
        let currentFrameIndex = 0;
        let tool = 'pen'; // 'pen' or 'eraser'
        let isDrawing = false;
        let isPlaying = false;
        let pendingDeleteIndex = -1;
        let lastX = 0;
        let lastY = 0;

        // Initialize
        function init() {
            addNewFrame();
            loadFromLocalStorage();
            updateFramesDisplay();
            setupEventListeners();
        }

        function setupEventListeners() {
            // Tool Selection
            penTool.addEventListener('click', () => selectTool('pen'));
            eraserTool.addEventListener('click', () => selectTool('eraser'));
            
            // Canvas
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);
            canvas.addEventListener('touchstart', handleTouchStart, false);
            canvas.addEventListener('touchmove', handleTouchMove, false);
            canvas.addEventListener('touchend', stopDrawing, false);
            
            // Controls
            sizeSlider.addEventListener('input', (e) => {
                sizeValue.textContent = e.target.value;
            });
            
            fpsSlider.addEventListener('input', (e) => {
                fpsValue.textContent = e.target.value + ' FPS';
            });
            
            clearBtn.addEventListener('click', clearCurrentFrame);
            playBtn.addEventListener('click', togglePlayback);
            addFrameBtn.addEventListener('click', addNewFrame);
            
            // Modal
            modalCancel.addEventListener('click', closeModal);
            modalConfirm.addEventListener('click', confirmDelete);
        }

        function selectTool(toolName) {
            tool = toolName;
            penTool.classList.toggle('active', tool === 'pen');
            eraserTool.classList.toggle('active', tool === 'eraser');
        }

        function startDrawing(e) {
            const rect = canvas.getBoundingClientRect();
            lastX = (e.clientX - rect.left) * (canvas.width / rect.width);
            lastY = (e.clientY - rect.top) * (canvas.height / rect.height);
            isDrawing = true;
        }

        function handleTouchStart(e) {
            if (e.touches.length === 1) {
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                lastX = (touch.clientX - rect.left) * (canvas.width / rect.width);
                lastY = (touch.clientY - rect.top) * (canvas.height / rect.height);
                isDrawing = true;
            }
        }

        function draw(e) {
            if (!isDrawing) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);
            
            drawLine(lastX, lastY, x, y);
            lastX = x;
            lastY = y;
        }

        function handleTouchMove(e) {
            if (!isDrawing || e.touches.length !== 1) return;
            e.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
            const y = (touch.clientY - rect.top) * (canvas.height / rect.height);
            
            drawLine(lastX, lastY, x, y);
            lastX = x;
            lastY = y;
        }

        function drawLine(fromX, fromY, toX, toY) {
            const size = parseInt(sizeSlider.value);
            
            ctx.lineWidth = size;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            if (tool === 'pen') {
                ctx.strokeStyle = '#000';
                ctx.globalCompositeOperation = 'source-over';
            } else {
                ctx.strokeStyle = 'rgba(0,0,0,0)';
                ctx.globalCompositeOperation = 'destination-out';
            }
            
            ctx.beginPath();
            ctx.moveTo(fromX, fromY);
            ctx.lineTo(toX, toY);
            ctx.stroke();
            
            ctx.globalCompositeOperation = 'source-over';
            saveCurrentFrame();
        }

        function stopDrawing() {
            isDrawing = false;
        }

        function addNewFrame() {
            const frameData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            frames.push(frameData);
            currentFrameIndex = frames.length - 1;
            updateFramesDisplay();
            updateStatus();
            saveToLocalStorage();
        }

        function clearCurrentFrame() {
            if (confirm('現在のフレームをクリアしますか？')) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                saveCurrentFrame();
                updateFramesDisplay();
            }
        }

        function saveCurrentFrame() {
            frames[currentFrameIndex] = ctx.getImageData(0, 0, canvas.width, canvas.height);
        }

        function loadFrameToCanvas(frameIndex) {
            if (frameIndex >= 0 && frameIndex < frames.length) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.putImageData(frames[frameIndex], 0, 0);
                currentFrameIndex = frameIndex;
                updateFramesDisplay();
                updateStatus();
            }
        }

        function updateFramesDisplay() {
            framesContainer.innerHTML = '';
            frames.forEach((frameData, index) => {
                const frameDiv = document.createElement('div');
                frameDiv.className = 'frame-item';
                if (index === currentFrameIndex) {
                    frameDiv.classList.add('active');
                }
                
                // Create thumbnail
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = canvas.width;
                tempCanvas.height = canvas.height;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.putImageData(frameData, 0, 0);
                
                const img = document.createElement('img');
                img.className = 'frame-thumbnail';
                img.src = tempCanvas.toDataURL();
                frameDiv.appendChild(img);
                
                // Frame number
                const numberDiv = document.createElement('div');
                numberDiv.className = 'frame-number';
                numberDiv.textContent = index + 1;
                frameDiv.appendChild(numberDiv);
                
                // Action buttons
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'frame-actions';
                
                const dupBtn = document.createElement('button');
                dupBtn.textContent = '複製';
                dupBtn.onclick = (e) => {
                    e.stopPropagation();
                    duplicateFrame(index);
                };
                
                const delBtn = document.createElement('button');
                delBtn.textContent = '削除';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    showDeleteConfirm(index);
                };
                
                actionsDiv.appendChild(dupBtn);
                actionsDiv.appendChild(delBtn);
                frameDiv.appendChild(actionsDiv);
                
                // Click to select frame
                frameDiv.addEventListener('click', () => {
                    loadFrameToCanvas(index);
                });
                
                framesContainer.appendChild(frameDiv);
            });
        }

        function duplicateFrame(index) {
            const newFrameData = new ImageData(
                new Uint8ClampedArray(frames[index].data),
                frames[index].width,
                frames[index].height
            );
            frames.splice(index + 1, 0, newFrameData);
            currentFrameIndex = index + 1;
            updateFramesDisplay();
            updateStatus();
            saveToLocalStorage();
        }

        function showDeleteConfirm(index) {
            pendingDeleteIndex = index;
            document.getElementById('modalHeader').textContent = 'フレームを削除';
            document.getElementById('modalMessage').textContent = 'このフレームを削除しますか？この操作は取り消せません。';
            confirmModal.classList.add('active');
        }

        function closeModal() {
            confirmModal.classList.remove('active');
            pendingDeleteIndex = -1;
        }

        function confirmDelete() {
            if (pendingDeleteIndex >= 0) {
                frames.splice(pendingDeleteIndex, 1);
                if (frames.length === 0) {
                    addNewFrame();
                } else {
                    currentFrameIndex = Math.min(pendingDeleteIndex, frames.length - 1);
                    loadFrameToCanvas(currentFrameIndex);
                }
                updateFramesDisplay();
                updateStatus();
                saveToLocalStorage();
            }
            closeModal();
        }

        function updateStatus() {
            status.textContent = `フレーム: ${currentFrameIndex + 1}/${frames.length}`;
        }

        function togglePlayback() {
            isPlaying = !isPlaying;
            playBtn.style.background = isPlaying ? '#ff9800' : '';
            
            if (isPlaying) {
                playAnimation();
            }
        }

        async function playAnimation() {
            const fps = parseInt(fpsSlider.value);
            const frameTime = 1000 / fps;
            let frameIndex = 0;

            while (isPlaying) {
                loadFrameToCanvas(frameIndex);
                await new Promise(resolve => setTimeout(resolve, frameTime));
                
                frameIndex = (frameIndex + 1) % frames.length;
            }
        }

        function updateCanvasWithOnionSkin() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (onionSkinToggle.checked && currentFrameIndex > 0) {
                ctx.globalAlpha = 0.3;
                ctx.putImageData(frames[currentFrameIndex - 1], 0, 0);
                ctx.globalAlpha = 1;
            }
            
            ctx.putImageData(frames[currentFrameIndex], 0, 0);
        }

        onionSkinToggle.addEventListener('change', () => {
            updateCanvasWithOnionSkin();
        });

        function saveToLocalStorage() {
            try {
                const data = {
                    frames: frames.map(f => f.data.buffer),
                    width: canvas.width,
                    height: canvas.height,
                    currentFrameIndex: currentFrameIndex
                };
                // Note: This is simplified; full buffer serialization requires Base64
                localStorage.setItem('parapara-editor', JSON.stringify({
                    lastSaved: new Date().toISOString(),
                    frameCount: frames.length
                }));
            } catch (e) {
                console.log('Could not save to localStorage:', e);
            }
        }

        function loadFromLocalStorage() {
            try {
                const saved = localStorage.getItem('parapara-editor');
                if (saved) {
                    console.log('Loaded from localStorage:', saved);
                }
            } catch (e) {
                console.log('Could not load from localStorage:', e);
            }
        }

        // Start
        init();
    </script>
</body>
</html>
