<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rhythm Game</title>
<style>
html,body{
  margin:0;
  padding:0;
  background:#000;
  overflow:hidden;
  touch-action:none;
  font-family:sans-serif;
  color:#fff;
}
#ui{
  position:fixed;
  top:10px;
  left:10px;
  z-index:10;
  font-size:14px;
}
button{margin:2px;}
canvas{display:block;}
#result{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}
</style>
</head>
<body>

<div id="ui">
  Speed <input type="range" id="speed" min="1" max="5" step="0.1" value="2"><br>
  Offset(ms) <input type="number" id="offset" value="0"><br>
  <button onclick="startGame()">START</button>
  <button onclick="retry()">RETRY</button>
  <button onclick="autoPlayToggle()">AUTO</button>
</div>

<div id="result">
  <h1>RESULT</h1>
  <div id="scoreText"></div>
  <button onclick="retry()">Retry</button>
</div>

<canvas id="game"></canvas>
<audio id="music" src=""></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const audio = document.getElementById("music");

let DPR = window.devicePixelRatio || 1;
let W,H;

function resize(){
  W = canvas.width = innerWidth * DPR;
  H = canvas.height = innerHeight * DPR;
  canvas.style.width = innerWidth + "px";
  canvas.style.height = innerHeight + "px";
}
resize();
addEventListener("resize",resize);

// ===== SETTINGS =====
let laneCount = 4;
let lanes = [];
let speed = 2;
let offset = 0;
let auto = false;

// ===== STATE =====
let notes = [];
let startTime = 0;
let combo = 0;
let score = 0;
let hits = [];
let playing = false;

// ===== NOTE TYPES =====
const TAP=0, FLICK=1, HOLD=2, SLIDE=3;

// ===== SAMPLE CHART =====
function loadChart(){
  notes = [];
  for(let i=0;i<50;i++){
    notes.push({
      time: i*500,
      lane: i%laneCount,
      type: i%4,
      duration: 500
    });
  }
}

// ===== INPUT =====
let touches = {};

canvas.addEventListener("touchstart",e=>{
  for(let t of e.changedTouches){
    touches[t.identifier] = {x:t.clientX, y:t.clientY, startX:t.clientX, startY:t.clientY, time:performance.now()};
    handleInput(t.clientX, t.clientY, "start", t.identifier);
  }
});

canvas.addEventListener("touchmove",e=>{
  for(let t of e.changedTouches){
    if(!touches[t.identifier]) continue;
    touches[t.identifier].x = t.clientX;
    touches[t.identifier].y = t.clientY;
  }
});

canvas.addEventListener("touchend",e=>{
  for(let t of e.changedTouches){
    let data = touches[t.identifier];
    if(data){
      handleFlick(data, t);
    }
    delete touches[t.identifier];
  }
});

function getLane(x){
  return Math.floor(x / (innerWidth / laneCount));
}

// ===== JUDGE =====
function judge(diff){
  diff = Math.abs(diff);
  if(diff < 50) return "PERFECT";
  if(diff < 100) return "GREAT";
  if(diff < 150) return "GOOD";
  return "MISS";
}

function applyJudge(j){
  if(j==="MISS"){
    combo=0;
  }else{
    combo++;
    score += (j==="PERFECT"?1000:j==="GREAT"?700:400);
  }
}

// ===== INPUT HANDLER =====
function handleInput(x,y,type,id){
  if(!playing) return;

  let lane = getLane(x);
  let now = performance.now() - startTime + offset;

  let target = notes.find(n=>!n.hit && Math.abs(n.time-now)<200 && n.lane===lane);
  if(!target) return;

  let j = judge(now - target.time);
  target.hit = true;
  applyJudge(j);

  hits.push({x,y,life:20});
}

function handleFlick(start, endTouch){
  let dx = endTouch.clientX - start.startX;
  let dy = endTouch.clientY - start.startY;

  let dist = Math.sqrt(dx*dx+dy*dy);
  if(dist < 30) return;

  let dir = Math.abs(dx)>Math.abs(dy) ? (dx>0?"RIGHT":"LEFT") : "UP";
}

// ===== GAME LOOP =====
function update(){
  if(!playing) return;

  let now = performance.now() - startTime + offset;

  // auto play
  if(auto){
    notes.forEach(n=>{
      if(!n.hit && now > n.time){
        n.hit=true;
        applyJudge("PERFECT");
      }
    });
  }

  // miss
  notes.forEach(n=>{
    if(!n.hit && now - n.time > 200){
      n.hit=true;
      applyJudge("MISS");
    }
  });
}

function draw(){
  ctx.clearRect(0,0,W,H);

  // lanes
  for(let i=0;i<laneCount;i++){
    let x = i * W/laneCount;
    ctx.fillStyle="rgba(255,255,255,0.1)";
    ctx.fillRect(x,0,W/laneCount,H);
  }

  let lineY = H*0.8;

  // judge line
  ctx.fillStyle="#fff";
  ctx.fillRect(0,lineY,W,5);

  let now = performance.now() - startTime + offset;

  // notes
  notes.forEach(n=>{
    if(n.hit) return;
    let t = (n.time - now)/1000;
    let y = lineY - t * H * speed;
    let x = n.lane * W/laneCount + W/laneCount/2;

    ctx.fillStyle = ["#0ff","#f0f","#ff0","#0f0"][n.type];
    ctx.beginPath();
    ctx.arc(x,y,20,0,Math.PI*2);
    ctx.fill();
  });

  // hits
  hits.forEach(h=>{
    ctx.fillStyle="rgba(255,255,255,"+(h.life/20)+")";
    ctx.beginPath();
    ctx.arc(h.x*DPR,h.y*DPR,30,0,Math.PI*2);
    ctx.fill();
    h.life--;
  });
  hits = hits.filter(h=>h.life>0);

  // UI
  ctx.fillStyle="#fff";
  ctx.fillText("Score:"+score,20,40);
  ctx.fillText("Combo:"+combo,20,80);
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

// ===== CONTROL =====
function startGame(){
  loadChart();
  score=0;
  combo=0;
  hits=[];
  notes.forEach(n=>n.hit=false);

  speed = parseFloat(document.getElementById("speed").value);
  offset = parseInt(document.getElementById("offset").value);

  startTime = performance.now();
  playing = true;

  audio.currentTime=0;
  audio.play().catch(()=>{});
}

function retry(){
  document.getElementById("result").style.display="none";
  startGame();
}

function autoPlayToggle(){
  auto = !auto;
}

// ===== END CHECK =====
setInterval(()=>{
  if(!playing) return;
  let allHit = notes.every(n=>n.hit);
  if(allHit){
    playing=false;
    showResult();
  }
},500);

function showResult(){
  let acc = score/(notes.length*1000)*100;
  document.getElementById("scoreText").innerHTML =
    "Score:"+score+"<br>Accuracy:"+acc.toFixed(2)+"%<br>Max Combo:"+combo;
  document.getElementById("result").style.display="flex";
}
</script>

</body>
</html>
