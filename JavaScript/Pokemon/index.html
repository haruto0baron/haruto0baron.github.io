<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ポケモン風ゲーム</title>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body { margin:0; background:black; }
canvas { image-rendering: pixelated; }
</style>
</head>

<body>
<script>

/* =========================
   🎮 データ
========================= */
const TYPES = {
  fire: { grass: 2, water: 0.5 },
  water: { fire: 2, grass: 0.5 },
  grass: { water: 2, fire: 0.5 }
};

const MONSTERS = [
  { name:"フレイムン", type:"fire", hp:35, atk:12, def:6, spd:8 },
  { name:"アクアット", type:"water", hp:38, atk:10, def:7, spd:7 },
  { name:"リーフィ", type:"grass", hp:40, atk:9, def:8, spd:6 },
  { name:"ゴースティ", type:"ghost", hp:28, atk:14, def:5, spd:10 },
  { name:"スプラット", type:"normal", hp:42, atk:8, def:9, spd:5 }
];

/* =========================
   💾 セーブ
========================= */
const Save = {
  load() {
    return JSON.parse(localStorage.getItem("save")) || { x:400, y:300 };
  },
  save(data) {
    localStorage.setItem("save", JSON.stringify(data));
  }
};

/* =========================
   🐾 モンスター
========================= */
class Monster {
  constructor(data) {
    Object.assign(this, data);
    this.maxHp = this.hp;
    this.level = 1;
  }
}

/* =========================
   🧍 プレイヤー
========================= */
class Player {
  constructor(scene, data) {
    this.scene = scene;
    this.sprite = scene.add.rectangle(data.x, data.y, 16, 16, 0x00ffcc);
    this.speed = 2;
  }

  update(c) {
    if (c.left.isDown) this.sprite.x -= this.speed;
    if (c.right.isDown) this.sprite.x += this.speed;
    if (c.up.isDown) this.sprite.y -= this.speed;
    if (c.down.isDown) this.sprite.y += this.speed;
  }
}

/* =========================
   🌍 フィールド
========================= */
class FieldScene extends Phaser.Scene {
  constructor(){ super("Field"); }

  create() {
    this.cameras.main.setZoom(2);

    this.add.rectangle(400,300,800,600,0x3a7d44);

    this.saveData = Save.load();
    this.player = new Player(this, this.saveData);

    this.cursors = this.input.keyboard.createCursorKeys();

    this.grass = this.add.rectangle(400,300,300,200,0x2ecc71).setAlpha(0.7);

    // パララックス風
    this.bg2 = this.add.rectangle(400,300,900,700,0x1e5631).setAlpha(0.3);

    this.bgm = new Howl({
      src:["https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8e3b3d69b.mp3"],
      loop:true, volume:0.3
    }).play();
  }

  update() {
    this.player.update(this.cursors);

    this.bg2.x = this.player.sprite.x * 0.05;

    if (Phaser.Geom.Rectangle.Contains(this.grass.getBounds(),
      this.player.sprite.x, this.player.sprite.y)) {

      if (Math.random() < 0.015) {
        Save.save({
          x: this.player.sprite.x,
          y: this.player.sprite.y
        });
        this.scene.start("Battle");
      }
    }
  }
}

/* =========================
   ⚔️ バトル
========================= */
class BattleScene extends Phaser.Scene {
  constructor(){ super("Battle"); }

  create() {
    this.state = "intro";

    this.cameras.main.fadeIn(400);
    this.cameras.main.shake(200, 0.01);

    this.add.rectangle(400,300,800,600,0x1c1c3c);

    this.playerMonster = new Monster(MONSTERS[0]);
    this.enemyMonster = new Monster(
      Phaser.Utils.Array.GetRandom(MONSTERS)
    );

    this.playerSprite = this.add.circle(200,400,25,0x00ffcc).setDepth(1);
    this.enemySprite = this.add.circle(600,200,25,0xff6666);

    this.createUI();
    this.showText(`やせいの ${this.enemyMonster.name} が あらわれた！`, () => {
      this.state = "menu";
    });
  }

  createUI() {
    // テキストボックス
    this.box = this.add.rectangle(400,520,760,140,0xffffff)
      .setStrokeStyle(4,0x000000).setShadow(2,2,0x000000,0.5);

    this.text = this.add.text(40,460,"",{
      fontFamily:'"Press Start 2P"', fontSize:"12px", color:"#000"
    });

    // HPバー
    this.hpBar = this.add.rectangle(600,150,120,10,0x00ff00);

    // メニュー
    this.menu = ["たたかう","にげる"];
    this.menuIndex = 0;

    this.menuText = this.add.text(450,460,"",{
      fontFamily:'"Press Start 2P"', fontSize:"12px", color:"#000"
    });

    this.updateMenu();

    this.input.keyboard.on("keydown", e=>{
      if(this.state !== "menu") return;

      if(e.key==="ArrowDown") this.menuIndex=(this.menuIndex+1)%2;
      if(e.key==="ArrowUp") this.menuIndex=(this.menuIndex+1)%2;

      if(e.key==="Enter") this.select();

      this.updateMenu();
    });
  }

  updateMenu() {
    this.menuText.setText(
      this.menu.map((m,i)=>(i===this.menuIndex?"▶ ":"  ")+m).join("\n")
    );
  }

  showText(msg, cb) {
    this.state = "text";
    this.text.setText("");
    let i=0;

    this.time.addEvent({
      repeat: msg.length-1,
      delay: 25,
      callback: ()=>{
        this.text.text += msg[i++];
      },
      onComplete: ()=> {
        this.time.delayedCall(400, cb);
      }
    });
  }

  select() {
    if(this.menu[this.menuIndex]==="たたかう"){
      this.turn();
    } else {
      this.scene.start("Field");
    }
  }

  turn() {
    this.state="anim";

    let dmg = this.calcDamage(this.playerMonster, this.enemyMonster);

    this.tweens.add({
      targets:this.enemySprite,
      x:this.enemySprite.x-30,
      yoyo:true,
      duration:80,
      repeat:2
    });

    this.enemyMonster.hp -= dmg;

    this.tweens.add({
      targets:this.hpBar,
      width:120*(this.enemyMonster.hp/this.enemyMonster.maxHp),
      duration:400
    });

    this.showText(`${this.playerMonster.name} のこうげき！ ${dmg}ダメージ！`, ()=>{
      if(this.enemyMonster.hp<=0){
        this.showText("てきを たおした！", ()=>{
          this.scene.start("Field");
        });
      } else {
        this.enemyTurn();
      }
    });
  }

  enemyTurn() {
    let dmg = this.calcDamage(this.enemyMonster, this.playerMonster);

    this.cameras.main.shake(200,0.01);

    this.showText(`てきの こうげき！ ${dmg}ダメージ！`, ()=>{
      this.state="menu";
    });
  }

  calcDamage(a,b){
    let base = a.atk - b.def;
    let mult = TYPES[a.type]?.[b.type] || 1;
    return Math.max(1, Math.floor(base * mult + Phaser.Math.Between(0,3)));
  }
}

/* =========================
   🚀 起動
========================= */
new Phaser.Game({
  type:Phaser.AUTO,
  width:800,
  height:600,
  pixelArt:true,
  scene:[FieldScene, BattleScene]
});

</script>
</body>
</html>
