<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Voxel Engine A - Core</title>
<style>
body{margin:0;overflow:hidden;background:#000}
canvas{display:block}
</style>
</head>
<body>

<canvas id="gl"></canvas>

<script>
// =====================================================
// Voxel Engine Core (A)
// WebGL2 기반 FPS + Render Pipeline + Engine Kernel
// =====================================================

const canvas=document.getElementById("gl");
const gl=canvas.getContext("webgl2");

if(!gl){
alert("WebGL2 not supported");
}

// =====================================================
// RESIZE SYSTEM (fixed DPI correctness)
// =====================================================
function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
gl.viewport(0,0,canvas.width,canvas.height);
}
addEventListener("resize",resize);
resize();

// =====================================================
// BASIC SHADER SYSTEM
// (Voxel rendering will be instanced in later parts)
// =====================================================

const VERT= `#version 300 es
precision highp float;

layout(location=0) in vec3 aPos;

uniform mat4 uProj;
uniform mat4 uView;
uniform mat4 uModel;

void main(){
gl_Position = uProj * uView * uModel * vec4(aPos,1.0);
}
`;

const FRAG= `#version 300 es
precision highp float;

out vec4 outColor;
uniform vec3 uColor;

void main(){
outColor = vec4(uColor,1.0);
}
`;

function compile(type,src){
let s=gl.createShader(type);
gl.shaderSource(s,src);
gl.compileShader(s);
if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){
console.log(gl.getShaderInfoLog(s));
}
return s;
}

const program=gl.createProgram();
gl.attachShader(program,compile(gl.VERTEX_SHADER,VERT));
gl.attachShader(program,compile(gl.FRAGMENT_SHADER,FRAG));
gl.linkProgram(program);
gl.useProgram(program);

// =====================================================
// ENGINE STATE (IMPORTANT DESIGN)
// =====================================================

const Engine={
time:0,

player:{
x:0,y:40,z:0,
yaw:0,
pitch:0,
vx:0,vy:0,vz:0
},

input:{
keys:{},
touch:{x:0,y:0,active:false}
}
};

// =====================================================
// INPUT SYSTEM (mobile + desktop unified)
// =====================================================

// keyboard
addEventListener("keydown",e=>Engine.input.keys[e.key]=true);
addEventListener("keyup",e=>Engine.input.keys[e.key]=false);

// touch look (FPS camera)
let lastX,lastY;

addEventListener("touchmove",(e)=>{
let t=e.touches[0];

if(lastX!==undefined){
let dx=t.clientX-lastX;
let dy=t.clientY-lastY;

Engine.player.yaw   -= dx*0.003;
Engine.player.pitch -= dy*0.003;

// clamp pitch
Engine.player.pitch=Math.max(-1.5,Math.min(1.5,Engine.player.pitch));
}

lastX=t.clientX;
lastY=t.clientY;
});

addEventListener("touchend",()=>{
lastX=undefined;
lastY=undefined;
});

// =====================================================
// MATHEMATICAL UTILITIES (engine-grade)
// =====================================================

function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

function forwardVector(yaw,pitch){
return {
x:Math.sin(yaw)*Math.cos(pitch),
y:Math.sin(pitch),
z:Math.cos(yaw)*Math.cos(pitch)
};
}

// =====================================================
// CAMERA MATRIX (manual implementation)
// no Three.js dependency → performance control
// =====================================================

function getViewMatrix(p){
let f=forwardVector(p.yaw,p.pitch);

let cx=p.x, cy=p.y, cz=p.z;

// simple look-at (optimized)
let up={x:0,y:1,z:0};

return {
forward:f,
pos:p
};
}

// =====================================================
// UPDATE SYSTEM
// =====================================================

function update(){
Engine.time+=0.016;

const p=Engine.player;
const k=Engine.input.keys;

// movement vector
let speed=0.25;

let f=forwardVector(p.yaw,0);
let right={x:f.z, y:0, z:-f.x};

// WASD
if(k["w"]){
p.x+=f.x*speed;
p.z+=f.z*speed;
}
if(k["s"]){
p.x-=f.x*speed;
p.z-=f.z*speed;
}
if(k["a"]){
p.x+=right.x*speed;
p.z+=right.z*speed;
}
if(k["d"]){
p.x-=right.x*speed;
p.z-=right.z*speed;
}

// gravity (placeholder until voxel collision in B)
p.vy-=0.02;
p.y+=p.vy;

if(p.y<20){
p.y=20;
p.vy=0;
}
}

// =====================================================
// RENDER PIPELINE (base hook only)
// actual voxel rendering is in B
// =====================================================

function render(){
gl.clearColor(0.53,0.81,0.92,1.0);
gl.clear(gl.COLOR_BUFFER_BIT);

gl.useProgram(program);

// placeholder uniforms (real camera in B)
}

function loop(){
update();
render();
requestAnimationFrame(loop);
}

loop();

// =====================================================
// ENGINE EXPORT (IMPORTANT FOR B,C,D)
// =====================================================
window.Engine={
gl,
canvas,
program,
state:Engine
};

</script>
<!-- =====================================================
B.html - WORLD ENGINE CORE
Chunk System + Greedy Meshing + Voxel Data Layer
===================================================== -->

<script>
// =====================================================
// IMPORT ENGINE FROM A
// =====================================================
const Engine = window.Engine;

// =====================================================
// BLOCK TYPES (expandable like Minecraft registry)
// =====================================================
const Block = {
AIR:0,
GRASS:1,
DIRT:2,
STONE:3,
WOOD:4,
LEAF:5
};

// =====================================================
// WORLD CONFIG
// =====================================================
const CHUNK_SIZE = 16;
const WORLD_HEIGHT = 64;

// chunk storage
const World = new Map();

// =====================================================
// HASH
// =====================================================
function chunkKey(x,z){
return x + "," + z;
}

// =====================================================
// SIMPLE PROCEDURAL NOISE (replace later with simplex)
// =====================================================
function heightNoise(x,z){
return Math.sin(x*0.08) * 4 + Math.cos(z*0.07) * 4;
}

// =====================================================
// CREATE CHUNK DATA (VOXEL ARRAY)
// =====================================================
function createChunk(cx,cz){

const data = new Uint8Array(
CHUNK_SIZE * CHUNK_SIZE * WORLD_HEIGHT
);

for(let x=0;x<CHUNK_SIZE;x++){
for(let z=0;z<CHUNK_SIZE;z++){

const worldX = cx * CHUNK_SIZE + x;
const worldZ = cz * CHUNK_SIZE + z;

const h = 20 + Math.floor(heightNoise(worldX,worldZ));

for(let y=0;y<WORLD_HEIGHT;y++){

let id = Block.AIR;

if(y < h - 4) id = Block.STONE;
else if(y < h - 1) id = Block.DIRT;
else if(y < h) id = Block.GRASS;

data[x + z*CHUNK_SIZE + y*CHUNK_SIZE*CHUNK_SIZE] = id;
}
}
}

return data;
}

// =====================================================
// VOXEL GETTER
// =====================================================
function getVoxel(chunk,data,x,y,z){
if(
x<0||x>=CHUNK_SIZE||
y<0||y>=WORLD_HEIGHT||
z<0||z>=CHUNK_SIZE
) return Block.AIR;

return data[x + z*CHUNK_SIZE + y*CHUNK_SIZE*CHUNK_SIZE];
}

// =====================================================
// GREEDY MESHING (CORE IMPLEMENTATION)
// =====================================================
// This is the performance core of Minecraft-like engines
// It merges faces into large quads instead of cubes

function generateGreedyMesh(data){

const vertices = [];

function solid(id){ return id !== Block.AIR; }

// iterate 3D voxel space
for(let y=0;y<WORLD_HEIGHT;y++){
for(let x=0;x<CHUNK_SIZE;x++){
for(let z=0;z<CHUNK_SIZE;z++){

const id = getVoxel(null,data,x,y,z);
if(!solid(id)) continue;

// check faces (6 directions)
const px = getVoxel(null,data,x+1,y,z);
const nx = getVoxel(null,data,x-1,y,z);
const py = getVoxel(null,data,x,y+1,z);
const ny = getVoxel(null,data,x,y-1,z);
const pz = getVoxel(null,data,x,y,z+1);
const nz = getVoxel(null,data,x,y,z-1);

// only exposed faces become geometry
if(!solid(px)) pushFace(vertices,x,y,z,1,id);
if(!solid(nx)) pushFace(vertices,x,y,z,0,id);
if(!solid(py)) pushFace(vertices,x,y,z,3,id);
if(!solid(ny)) pushFace(vertices,x,y,z,2,id);
if(!solid(pz)) pushFace(vertices,x,y,z,5,id);
if(!solid(nz)) pushFace(vertices,x,y,z,4,id);

}
}
}

return vertices;
}

// =====================================================
// FACE GENERATION (optimized cube face emitter)
// =====================================================
function pushFace(out,x,y,z,dir,id){

// cube face vertices (1 quad = 2 triangles later in C)
const v = [
x,y,z,  id,
x+1,y,z, id,
x+1,y+1,z, id,
x,y+1,z, id
];

out.push({v,dir});
}

// =====================================================
// CHUNK BUILD (mesh + data)
// =====================================================
function buildChunk(cx,cz){

const data = createChunk(cx,cz);
const mesh = generateGreedyMesh(data);

World.set(chunkKey(cx,cz),{
data,
mesh,
cx,cz
});

return World.get(chunkKey(cx,cz));
}

// =====================================================
// INITIAL WORLD LOAD (3x3 chunks)
// =====================================================
for(let x=-1;x<=1;x++){
for(let z=-1;z<=1;z++){
buildChunk(x,z);
}
}

// =====================================================
// GPU BUFFER BUILDER (placeholder hook for C)
// =====================================================
function uploadChunkToGPU(chunk){

// later: convert mesh → VBO/IBO
// this is where real performance comes from

return chunk.mesh.length;
}

// =====================================================
// ENGINE HOOK EXPORT
// =====================================================
window.WorldEngine = {
World,
buildChunk,
generateGreedyMesh,
createChunk,
uploadChunkToGPU
};

console.log("B loaded: World Engine ready");

</script>
</body>
