<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mini Voxel Game</title>
<style>
body { margin: 0; overflow: hidden; }
#ui {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 10;
}
button {
  font-size: 16px;
  margin: 4px;
}
</style>
</head>
<body>

<div id="ui">
  <button onclick="setBlock('grass')">草</button>
  <button onclick="setBlock('wood')">木</button>
  <button onclick="setBlock('stone')">石</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene = new THREE.Scene();
scene.background = new THREE.Color(0xaadfff);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(5,5,10);

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,10,10);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff, 0.4));

// 地面
let blocks = [];

function makeBlock(x,y,z,color){
  let geo = new THREE.BoxGeometry(1,1,1);
  let mat = new THREE.MeshLambertMaterial({color});
  let cube = new THREE.Mesh(geo, mat);
  cube.position.set(x,y,z);
  scene.add(cube);
  blocks.push(cube);
  return cube;
}

// 初期地面
for(let x=-5;x<=5;x++){
  for(let z=-5;z<=5;z++){
    makeBlock(x,0,z,0x55aa55);
  }
}

let selected = 'wood';

function setBlock(type){
  selected = type;
}

function colorFromType(type){
  if(type==='grass') return 0x55ff55;
  if(type==='stone') return 0x888888;
  if(type==='wood') return 0x8b5a2b;
}

// レイキャスト
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();

function onTap(event){
  let x = (event.clientX / innerWidth) * 2 - 1;
  let y = -(event.clientY / innerHeight) * 2 + 1;
  mouse.set(x,y);

  raycaster.setFromCamera(mouse,camera);
  let hits = raycaster.intersectObjects(blocks);

  if(hits.length>0){
    let hit = hits[0];

    // 削除（長押し代わり：Shiftで削除）
    if(event.shiftKey){
      scene.remove(hit.object);
      blocks = blocks.filter(b=>b!==hit.object);
      return;
    }

    // 追加
    let pos = hit.object.position.clone().add(hit.face.normal);
    makeBlock(pos.x,pos.y,pos.z,colorFromType(selected));
  }
}

window.addEventListener('click', onTap);

// シンプルカメラ回転（指ドラッグ）
let dragging=false, prevX=0, prevY=0;

window.addEventListener('pointerdown', e=>{
  dragging=true;
  prevX=e.clientX;
  prevY=e.clientY;
});

window.addEventListener('pointerup', ()=>dragging=false);

window.addEventListener('pointermove', e=>{
  if(!dragging) return;

  let dx = e.clientX - prevX;
  let dy = e.clientY - prevY;

  camera.position.x -= dx*0.01;
  camera.position.y += dy*0.01;

  prevX=e.clientX;
  prevY=e.clientY;
});

// ズーム
window.addEventListener('wheel', e=>{
  camera.position.z += e.deltaY*0.01;
});

function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
