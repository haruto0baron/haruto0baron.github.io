<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>障害物避けゲーム</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background-color: #f0f0f0;
        touch-action: none; /* タッチ操作をゲームに最適化 */
    }
    #gameCanvas {
        display: block;
        margin: 0 auto;
        background-color: #ffffff;
        border: 1px solid #000;
    }
    /* タッチボタン */
    .touch-btn {
        position: fixed;
        bottom: 50px;
        width: 60px;
        height: 60px;
        font-size: 30px;
        opacity: 0.5;
        border-radius: 30px;
        border: none;
        background-color: #333;
        color: white;
        user-select: none;
    }
    #leftBtn { left: 50px; }
    #rightBtn { right: 50px; }
</style>
</head>
<body>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<!-- タッチ用ボタン -->
<button id="leftBtn" class="touch-btn">◀</button>
<button id="rightBtn" class="touch-btn">▶</button>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// プレイヤー設定
let player = {
    x: canvas.width / 2 - 15,
    y: canvas.height - 30,
    width: 30,
    height: 30,
    speed: 5
};

// 障害物設定
let obstacles = [];
let obstacleSpeed = 2;

// キー・タッチ入力
let rightPressed = false;
let leftPressed = false;

// キーボード操作
document.addEventListener('keydown', (e) => {
    if (e.key === 'Right' || e.key === 'ArrowRight') rightPressed = true;
    if (e.key === 'Left' || e.key === 'ArrowLeft') leftPressed = true;
});
document.addEventListener('keyup', (e) => {
    if (e.key === 'Right' || e.key === 'ArrowRight') rightPressed = false;
    if (e.key === 'Left' || e.key === 'ArrowLeft') leftPressed = false;
});

// タッチ操作
const leftBtn = document.getElementById('leftBtn');
const rightBtn = document.getElementById('rightBtn');

leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); leftPressed = true; });
leftBtn.addEventListener('touchend', (e) => { e.preventDefault(); leftPressed = false; });

rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); rightPressed = true; });
rightBtn.addEventListener('touchend', (e) => { e.preventDefault(); rightPressed = false; });

// 障害物生成
function createObstacle() {
    let obstacleX = Math.random() * (canvas.width - 20);
    obstacles.push({ x: obstacleX, y: 0, width: 20, height: 20 });
}

// ゲームループ
function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // プレイヤー描画
    ctx.fillStyle = 'blue';
    ctx.fillRect(player.x, player.y, player.width, player.height);

    // 移動
    if (rightPressed && player.x < canvas.width - player.width) player.x += player.speed;
    if (leftPressed && player.x > 0) player.x -= player.speed;

    // 障害物描画・移動
    ctx.fillStyle = 'red';
    for (let i = 0; i < obstacles.length; i++) {
        let obs = obstacles[i];
        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
        obs.y += obstacleSpeed;

        // 当たり判定
        if (player.x < obs.x + obs.width &&
            player.x + player.width > obs.x &&
            player.y < obs.y + obs.height &&
            player.y + player.height > obs.y) {
            alert('ゲームオーバー');
            document.location.reload();
            return;
        }
    }

    requestAnimationFrame(gameLoop);
}

// 障害物生成間隔
setInterval(createObstacle, 1000);

// 開始
gameLoop();
</script>

</body>
</html>
