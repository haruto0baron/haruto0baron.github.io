<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アクションゲーム 改良版</title>
<style>
  body { margin:0; overflow:hidden; background:#222; }
  canvas { display:block; touch-action:none; background:#222; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let gravity = 1;
let keys = {};
let score = 0;
let gameOver = false;

let player = {
    x: 100,
    y: canvas.height - 150,
    width: 50,
    height: 50,
    color: "#0f0",
    dy: 0,
    jumpPower: 20,
    onGround: true
};

let obstacles = [];
let obstacleTypes = [
    { width: 50, height: 50, color: "#f00", speed: 6 },
    { width: 30, height: 80, color: "#ff0", speed: 4 },
    { width: 80, height: 30, color: "#f0f", speed: 8 }
];

let powerUps = [];

// 衝突判定
function checkCollision(a, b) {
    return !(a.x > b.x + b.width ||
             a.x + a.width < b.x ||
             a.y > b.y + b.height ||
             a.y + a.height < b.y);
}

// 障害物生成
function spawnObstacle() {
    if(gameOver) return;
    let type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
    obstacles.push({
        x: canvas.width,
        y: canvas.height - type.height - 50,
        width: type.width,
        height: type.height,
        color: type.color,
        speed: type.speed
    });
}

// パワーアップ生成
function spawnPowerUp() {
    if(gameOver) return;
    powerUps.push({
        x: canvas.width,
        y: canvas.height - 200,
        width: 30,
        height: 30,
        color: "#0ff",
        type: "jumpBoost",
        speed: 5
    });
}

// ジャンプ操作
function jump() {
    if(player.onGround && !gameOver){
        player.dy = -player.jumpPower;
        player.onGround = false;
    }
}

// タッチ・キー操作
canvas.addEventListener("touchstart", jump);
window.addEventListener("keydown", (e)=>{ if(e.code === "Space") jump(); });

// ゲームループ
function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 背景と地面
    ctx.fillStyle = "#333";
    ctx.fillRect(0, canvas.height - 50, canvas.width, 50);

    // プレイヤー物理
    player.dy += gravity;
    player.y += player.dy;
    if(player.y + player.height >= canvas.height - 50){
        player.y = canvas.height - 50 - player.height;
        player.dy = 0;
        player.onGround = true;
    }

    // プレイヤー描画
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);

    // 障害物描画・更新
    for(let i=obstacles.length-1; i>=0; i--){
        obstacles[i].x -= obstacles[i].speed;
        ctx.fillStyle = obstacles[i].color;
        ctx.fillRect(obstacles[i].x, obstacles[i].y, obstacles[i].width, obstacles[i].height);

        if(checkCollision(player, obstacles[i])) gameOver = true;

        if(obstacles[i].x + obstacles[i].width < 0) obstacles.splice(i, 1);
    }

    // パワーアップ描画・更新
    for(let i=powerUps.length-1; i>=0; i--){
        powerUps[i].x -= powerUps[i].speed;
        ctx.fillStyle = powerUps[i].color;
        ctx.fillRect(powerUps[i].x, powerUps[i].y, powerUps[i].width, powerUps[i].height);

        if(checkCollision(player, powerUps[i])){
            player.jumpPower = Math.min(player.jumpPower + 2, 50); // 上限50
            powerUps.splice(i,1);
        }

        if(powerUps[i] && powerUps[i].x + powerUps[i].width < 0) powerUps.splice(i,1);
    }

    // スコア描画
    if(!gameOver) score += 0.1;
    ctx.fillStyle = "#fff";
    ctx.font = "30px Arial";
    ctx.fillText("スコア: " + Math.floor(score), 20, 40);

    // ゲームオーバー処理
    if(gameOver){
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#f00";
        ctx.font = "60px Arial";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width/2, canvas.height/2 - 20);
        ctx.fillStyle = "#fff";
        ctx.font = "40px Arial";
        ctx.fillText("スコア: " + Math.floor(score), canvas.width/2, canvas.height/2 + 40);
        ctx.font = "30px Arial";
        ctx.fillText("クリックまたはスペースキーで再スタート", canvas.width/2, canvas.height/2 + 90);

        // 再スタート操作
        canvas.addEventListener("click", restartGame, { once:true });
        window.addEventListener("keydown", (e)=>{ if(e.code === "Space") restartGame(); }, { once:true });
        return;
    }

    requestAnimationFrame(gameLoop);
}

// ゲーム再スタート
function restartGame(){
    obstacles = [];
    powerUps = [];
    player.y = canvas.height - 150;
    player.dy = 0;
    player.jumpPower = 20;
    player.onGround = true;
    score = 0;
    gameOver = false;
    gameLoop();
}

// 障害物・パワーアップ定期生成
setInterval(spawnObstacle, 1500);
setInterval(spawnPowerUp, 7000);

// ゲーム開始
gameLoop();
</script>
</body>
</html>
