<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>sakamoto server公式</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    font-family:"Segoe UI",sans-serif;
    background:#f5f7fb;
    color:#333;
}

/* ヘッダー */
header{
    background:white;
    border-bottom:1px solid #e0e0e0;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    margin:0;
    font-size:22px;
    font-weight:600;
}

/* ナビ */
nav a{
    margin-left:20px;
    text-decoration:none;
    color:#555;
    font-size:14px;
    transition:0.2s;
}

nav a:hover{
    color:#000;
}

/* セクション */
section{
    max-width:900px;
    margin:40px auto;
    padding:0 20px;
}

/* カード */
.card{
    background:white;
    padding:25px;
    border-radius:14px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
    margin-bottom:20px;
}

/* ボタン */
.button{
    display:inline-block;
    padding:10px 18px;
    background:#007aff;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-size:14px;
}

.button:hover{
    background:#0063cc;
}

/* ステータス */
.status{
    font-weight:bold;
    margin-top:10px;
}

/* フッター */
footer{
    text-align:center;
    padding:30px;
    color:#777;
}
</style>
</head>

<body>

<header>
    <h1>sakamoto server</h1>
    <nav>
        <a href="#top">Top</a>
        <a href="#server">Server</a>
        <a href="#blog">Blog</a>
    </nav>
</header>

<!-- トップ -->
<section id="top">
    <div class="card">
        <h2>トップページ</h2>
        <p>
            このサイトでは、制作物や運営しているMinecraftサーバーの情報を掲載しています。
        </p>
    </div>
</section>

<!-- サーバー -->
<section id="server">
    <div class="card">
        <h2>SAKAMOTO server</h2>
        <p>建築・サバイバル・PVPに対応したマルチサーバー</p>

        <p><strong>IP:</strong> around-enterprises.gl.at.ply.gg</p>
        <p><strong>ポート:</strong> 13680</p>

        <p class="status" id="status">状態確認中...</p>

        <a class="button" href="sakamoto.html">詳細を見る</a>
    </div>
</section>

<!-- ブログ -->
<section id="blog">
    <div class="card">
        <h2>ブログ</h2>
        <p>サーバーの開発状況やアップデート情報を掲載予定です。</p>

        <div class="card">
            </h2>サーバーを作ります！</h2>
            <p>現在、サーバーの基本システムを構築中です。</p>
            <a href="Blog/2026.4.10.html" class="button">記事を読む</a>
        </div>
    </div>
</section>

<footer>
    © 2026 Haruto0baron
</footer>

<script>
function updateStatus(){
    fetch("https://api.mcsrvstat.us/2/around-enterprises.gl.at.ply.gg")
    .then(res => res.json())
    .then(data => {
        const status = document.getElementById("status");

        if (data.online) {
            status.innerText = "オンライン (" + data.players.online + "人)";
            status.style.color = "green";
        } else {
            status.innerText = "オフライン";
            status.style.color = "red";
        }
    })
    .catch(() => {
        document.getElementById("status").innerText = "取得失敗";
    });
}

updateStatus();
setInterval(updateStatus, 30000);
</script>

</body>
</html>
