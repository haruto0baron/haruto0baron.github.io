<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>サーバーを作ります！</title>

<style>
body{
    margin:0;
    font-family:"Segoe UI",sans-serif;
    background:#f5f7fb;
    color:#333;
}

/* ヘッダー */
header{
    background:white;
    border-bottom:1px solid #e0e0e0;
    padding:15px 30px;
}

header h1{
    margin:0;
    font-size:20px;
}

/* コンテンツ */
.container{
    max-width:800px;
    margin:40px auto;
    padding:0 20px;
}

.article{
    background:white;
    padding:30px;
    border-radius:14px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.article h2{
    margin-top:0;
}

/* 日付 */
.date{
    color:#888;
    font-size:14px;
    margin-bottom:15px;
}

/* 戻るリンク */
.back{
    display:inline-block;
    margin-top:20px;
    text-decoration:none;
    color:#007aff;
    font-size:14px;
}
.back:hover{
    text-decoration:underline;
}

/* フッター */
footer{
    text-align:center;
    padding:30px;
    color:#777;
}
</style>
</head>

<body>

<header>
    <h1>ブログ</h1>
</header>

<div class="container">
    <div class="article">
        <h2>サーバーを作ります！</h2>
        <div class="date">2026年4月10日</div>

        <p>
            SAKAMOTO serverの開発を開始しました。
        </p>

        <p>
            現在は基本的なサーバー構成を整えている段階で、
            今後は建築・サバイバル・PVPのバランス調整を進めていく予定です。
        </p>

        <p>
            プレイヤーが快適に遊べる環境を目指して、
            さまざまな機能を追加していきます。
        </p>

        <p>
            今後のアップデート情報もこのブログで発信していくので、
            よければチェックしてみてください。
        </p>

        <a href="../index.html#blog" class="back">← 戻る</a>
    </div>
</div>

<footer>
    © 2026 Haruto0baron
</footer>

</body>
</html>
