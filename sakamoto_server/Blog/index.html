<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>回転ラン改良版</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
    touch-action: none;
  }
  canvas { display: block; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// ===== プレイヤー（中央固定） =====
const player = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  angle: 0,
  speed: 0,
  size: 12
};

let pressing = false;
let rotated = false; // ←これがバグ防止
let score = 0;
let gameOver = false;

// ===== 星（遠近感）=====
let stars = [];
for (let i = 0; i < 150; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    depth: Math.random() * 3 // 奥行き
  });
}

// ===== ワールドオフセット =====
let worldOffset = { x: 0, y: 0 };

// ===== 敵 & コイン =====
let enemies = [];
let coins = [];

setInterval(() => {
  enemies.push({
    x: worldOffset.x + Math.random() * canvas.width,
    y: worldOffset.y + Math.random() * canvas.height,
    size: 15
  });
}, 1500);

setInterval(() => {
  coins.push({
    x: worldOffset.x + Math.random() * canvas.width,
    y: worldOffset.y + Math.random() * canvas.height,
    size: 10,
    pulse: 0
  });
}, 1200);

// ===== 入力 =====
function pressStart() {
  if (gameOver) return;
  pressing = true;

  if (!rotated) {
    player.angle += Math.PI / 2;
    rotated = true;
  }
}

function pressEnd() {
  pressing = false;
  rotated = false;
}

addEventListener("mousedown", pressStart);
addEventListener("mouseup", pressEnd);
addEventListener("touchstart", pressStart);
addEventListener("touchend", pressEnd);

// ===== 更新 =====
function update() {
  if (gameOver) return;

  // 加速 / 減速
  if (pressing) player.speed += 0.2;
  else player.speed *= 0.95;

  player.speed = Math.min(player.speed, 8);

  // ワールド移動（スクロール）
  worldOffset.x += Math.cos(player.angle) * player.speed;
  worldOffset.y += Math.sin(player.angle) * player.speed;

  // 星（遠近スクロール）
  stars.forEach(s => {
    s.x -= Math.cos(player.angle) * player.speed * (0.2 + s.depth);
    s.y -= Math.sin(player.angle) * player.speed * (0.2 + s.depth);

    if (s.x < 0) s.x = canvas.width;
    if (s.x > canvas.width) s.x = 0;
    if (s.y < 0) s.y = canvas.height;
    if (s.y > canvas.height) s.y = 0;
  });

  // コインアニメ
  coins.forEach(c => c.pulse += 0.1);

  // 衝突判定
  enemies.forEach(e => {
    let dx = e.x - worldOffset.x - player.x;
    let dy = e.y - worldOffset.y - player.y;
    if (Math.hypot(dx, dy) < e.size + player.size) {
      gameOver = true;
    }
  });

  coins.forEach((c, i) => {
    let dx = c.x - worldOffset.x - player.x;
    let dy = c.y - worldOffset.y - player.y;
    if (Math.hypot(dx, dy) < c.size + player.size) {
      coins.splice(i, 1);
      score++;
    }
  });
}

// ===== 描画 =====
function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 星（奥行きでサイズ＆明るさ変化）
  stars.forEach(s => {
    ctx.globalAlpha = 0.3 + s.depth * 0.3;
    ctx.fillRect(s.x, s.y, 1 + s.depth, 1 + s.depth);
  });
  ctx.globalAlpha = 1;

  // コイン
  coins.forEach(c => {
    let x = c.x - worldOffset.x;
    let y = c.y - worldOffset.y;

    let scale = 1 + Math.sin(c.pulse) * 0.3;
    ctx.fillStyle = "gold";
    ctx.beginPath();
    ctx.arc(x, y, c.size * scale, 0, Math.PI * 2);
    ctx.fill();
  });

  // 敵
  ctx.fillStyle = "red";
  enemies.forEach(e => {
    let x = e.x - worldOffset.x;
    let y = e.y - worldOffset.y;

    ctx.beginPath();
    ctx.arc(x, y, e.size, 0, Math.PI * 2);
    ctx.fill();
  });

  // プレイヤー
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.rotate(player.angle);
  ctx.fillStyle = "cyan";
  ctx.beginPath();
  ctx.moveTo(15, 0);
  ctx.lineTo(-10, -8);
  ctx.lineTo(-10, 8);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // UI
  ctx.fillStyle = "white";
  ctx.font = "20px sans-serif";
  ctx.fillText("Score: " + score, 20, 30);

  if (gameOver) {
    ctx.font = "40px sans-serif";
    ctx.fillText("GAME OVER", canvas.width/2 - 140, canvas.height/2);
  }
}

// ===== ループ =====
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

addEventListener("resize", () => {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
});
</script>

</body>
</html>
