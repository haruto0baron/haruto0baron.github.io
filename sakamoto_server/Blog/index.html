<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ワンキー回転ラン</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
    touch-action: none;
  }
  canvas { display: block; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// ===== プレイヤー =====
const player = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  angle: 0,
  speed: 0,
  size: 12
};

let pressing = false;
let prevPressing = false;
let score = 0;
let gameOver = false;

// ===== スクリーンシェイク =====
let shake = 0;

// ===== 星（遠近）=====
let stars = [];
for (let i = 0; i < 160; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    depth: Math.random() * 3
  });
}

// ===== ワールド =====
let worldOffset = { x: 0, y: 0 };

// ===== 敵・コイン =====
let enemies = [];
let coins = [];
let particles = [];

// 敵
setInterval(() => {
  enemies.push({
    x: worldOffset.x + Math.random() * canvas.width,
    y: worldOffset.y + Math.random() * canvas.height,
    size: 15
  });
}, 1200);

// コイン
setInterval(() => {
  coins.push({
    x: worldOffset.x + Math.random() * canvas.width,
    y: worldOffset.y + Math.random() * canvas.height,
    size: 10,
    pulse: 0
  });
}, 900);

// ===== 入力 =====
function pressStart() {
  if (gameOver) return;
  pressing = true;
}

function pressEnd() {
  pressing = false;
}

addEventListener("mousedown", pressStart);
addEventListener("mouseup", pressEnd);
addEventListener("touchstart", pressStart);
addEventListener("touchend", pressEnd);

// ===== リスタート =====
function resetGame() {
  score = 0;
  gameOver = false;
  player.angle = 0;
  player.speed = 0;
  enemies = [];
  coins = [];
  particles = [];
  worldOffset = { x: 0, y: 0 };
}

// ===== パーティクル =====
function explode(x, y) {
  for (let i = 0; i < 18; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 5,
      vy: (Math.random() - 0.5) * 5,
      life: 1
    });
  }
}

// ===== 更新 =====
function update() {
  // リスタート
  if (gameOver) return;

  // 1タップ1回転（バグ修正済み）
  if (pressing && !prevPressing) {
    player.angle += Math.PI / 2;
  }
  prevPressing = pressing;

  // 加速・減速
  if (pressing) player.speed += 0.25;
  else player.speed *= 0.94;

  player.speed = Math.min(player.speed, 8);

  // スクロール
  worldOffset.x += Math.cos(player.angle) * player.speed;
  worldOffset.y += Math.sin(player.angle) * player.speed;

  // 星（遠近スクロール）
  stars.forEach(s => {
    s.x -= Math.cos(player.angle) * player.speed * (0.2 + s.depth);
    s.y -= Math.sin(player.angle) * player.speed * (0.2 + s.depth);

    if (s.x < 0) s.x = canvas.width;
    if (s.x > canvas.width) s.x = 0;
    if (s.y < 0) s.y = canvas.height;
    if (s.y > canvas.height) s.y = 0;
  });

  // コインアニメ
  coins.forEach(c => c.pulse += 0.15);

  // パーティクル
  particles.forEach((p, i) => {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.03;
    if (p.life <= 0) particles.splice(i, 1);
  });

  // 敵衝突
  enemies.forEach(e => {
    let dx = e.x - worldOffset.x - player.x;
    let dy = e.y - worldOffset.y - player.y;

    if (Math.hypot(dx, dy) < e.size + player.size) {
      gameOver = true;
      shake = 20;
      explode(player.x, player.y);
    }
  });

  // コイン取得
  coins.forEach((c, i) => {
    let dx = c.x - worldOffset.x - player.x;
    let dy = c.y - worldOffset.y - player.y;

    if (Math.hypot(dx, dy) < c.size + player.size) {
      coins.splice(i, 1);
      score++;
      explode(player.x, player.y);
    }
  });

  if (shake > 0) shake--;
}

// ===== 描画 =====
function draw() {
  // シェイク
  let sx = (Math.random() - 0.5) * shake;
  let sy = (Math.random() - 0.5) * shake;

  ctx.save();
  ctx.translate(sx, sy);

  // 背景
  ctx.fillStyle = "black";
  ctx.fillRect(-sx, -sy, canvas.width, canvas.height);

  // 星空（遠近）
  stars.forEach(s => {
    ctx.globalAlpha = 0.3 + s.depth * 0.3;
    ctx.fillStyle = "white";
    ctx.fillRect(s.x, s.y, 1 + s.depth, 1 + s.depth);
  });
  ctx.globalAlpha = 1;

  // コイン（アニメ）
  coins.forEach(c => {
    let x = c.x - worldOffset.x;
    let y = c.y - worldOffset.y;

    let scale = 1 + Math.sin(c.pulse) * 0.3;
    ctx.fillStyle = "gold";
    ctx.beginPath();
    ctx.arc(x, y, c.size * scale, 0, Math.PI * 2);
    ctx.fill();
  });

  // 敵
  ctx.fillStyle = "red";
  enemies.forEach(e => {
    let x = e.x - worldOffset.x;
    let y = e.y - worldOffset.y;

    ctx.beginPath();
    ctx.arc(x, y, e.size, 0, Math.PI * 2);
    ctx.fill();
  });

  // パーティクル
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = "cyan";
    ctx.fillRect(p.x, p.y, 3, 3);
  });
  ctx.globalAlpha = 1;

  // プレイヤー（色変化）
  let hue = (Date.now() / 10) % 360;
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.rotate(player.angle);
  ctx.fillStyle = `hsl(${hue},100%,60%)`;
  ctx.beginPath();
  ctx.moveTo(15, 0);
  ctx.lineTo(-10, -8);
  ctx.lineTo(-10, 8);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // UI
  ctx.fillStyle = "white";
  ctx.font = "20px sans-serif";
  ctx.fillText("Score: " + score, 20, 30);

  if (gameOver) {
    ctx.font = "40px sans-serif";
    ctx.fillText("GAME OVER", canvas.width/2 - 140, canvas.height/2);
    ctx.font = "20px sans-serif";
    ctx.fillText("Tap to Restart", canvas.width/2 - 80, canvas.height/2 + 40);
  }

  ctx.restore();
}

// ===== ループ =====
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

// ===== リスタート入力 =====
addEventListener("click", () => {
  if (gameOver) resetGame();
});
addEventListener("touchstart", () => {
  if (gameOver) resetGame();
});

// ===== リサイズ =====
addEventListener("resize", () => {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
});
</script>

</body>
</html>
